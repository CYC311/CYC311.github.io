<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生活工具套件 Pro - 15合1完整版</title>
    <!-- ✅ QR碼庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { 
            --primary: #667eea; 
            --secondary: #764ba2; 
            --success: #4caf50;
            --danger: #ff6b6b;
            --warning: #ffd93d;
            --bg: #ffffff; 
            --text: #333;
            --text-light: #666;
            --border: #e0e0e0;
        }
        body.dark-mode {
            --bg: #1e1e1e;
            --text: #f0f0f0;
            --text-light: #b0b0b0;
            --border: #444;
        }
        body { 
            font-family: 'Microsoft YaHei', 'Noto Sans CJK TC', sans-serif; 
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); 
            min-height: 100vh; 
            padding: 20px; 
            color: var(--text);
            transition: background 0.3s, color 0.3s;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header { 
            text-align: center; 
            color: white; 
            margin-bottom: 30px;
        }
        header h1 { font-size: 2.5rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        header p { font-size: 1.1rem; opacity: 0.95; margin-bottom: 15px; }
        .header-controls { 
            display: flex; 
            gap: 10px; 
            justify-content: center; 
            flex-wrap: wrap;
            margin-top: 15px;
        }
        .header-controls button {
            padding: 10px 15px;
            border: 2px solid white;
            border-radius: 8px;
            background: rgba(255,255,255,0.2);
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 0.95rem;
        }
        .header-controls button:hover { 
            background: rgba(255,255,255,0.4);
            transform: scale(1.05);
        }
        .tabs-container {
            background: var(--bg);
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            overflow-x: auto;
            border: 2px solid var(--border);
        }
        .tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 12px 16px;
            border: 2px solid var(--border);
            background: var(--bg);
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 0.95rem;
            white-space: nowrap;
            color: var(--text);
        }
        .tab-btn:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .card {
            background: var(--bg);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            border: 2px solid var(--border);
        }
        .card h2 { 
            color: var(--primary); 
            margin-bottom: 20px; 
            font-size: 1.5rem;
            border-bottom: 3px solid var(--primary);
            padding-bottom: 10px;
        }
        .card h3 {
            color: var(--text);
            margin-top: 15px;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
        }
        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .input-row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }
        label {
            font-weight: bold;
            color: var(--text);
            font-size: 0.95rem;
            margin-bottom: 5px;
        }
        input, select, textarea {
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 8px rgba(102,126,234,0.3);
        }
        input::placeholder {
            color: var(--text-light);
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--primary);
            color: white;
        }
        button:hover {
            background: var(--secondary);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }
        .btn-secondary {
            background: var(--border);
            color: var(--text);
        }
        .btn-secondary:hover {
            background: #d0d0d0;
            color: var(--text);
        }
        .result-box {
            background: linear-gradient(135deg, rgba(102,126,234,0.1) 0%, rgba(118,75,162,0.1) 100%);
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid var(--primary);
            margin-top: 15px;
            color: var(--text);
            word-break: break-all;
            white-space: pre-wrap;
            line-height: 1.6;
        }
        .stat-box {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 25px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 1.1rem;
        }
        .list-item {
            padding: 12px;
            margin: 8px 0;
            background: rgba(102,126,234,0.1);
            border-radius: 8px;
            border-left: 3px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .progress-bar {
            width: 100%;
            height: 20px;
            background: var(--border);
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--success), var(--primary));
            transition: width 0.3s;
        }
    </style>
</head>
<!-- ✅ 關鍵修復：添加 onload="init()" -->
<body onload="init()">
    <div class="container">
        <header>
            <h1>🛠️ 生活工具套件 Pro</h1>
            <p>15合1完整工具 - 加強版本</p>
            <div class="header-controls">
                <button onclick="toggleDarkMode()">🌙 深色模式</button>
                <button onclick="exportData()">📤 導出數據</button>
                <button onclick="importData()">📥 導入數據</button>
            </div>
        </header>

        <div class="tabs-container">
            <div class="tabs">
                <!-- ✅ 關鍵修復：使用 switchTab(id, this) -->
                <button class="tab-btn active" onclick="switchTab('calculator', this)">🧮 計算機</button>
                <button class="tab-btn" onclick="switchTab('converter', this)">📏 單位轉換</button>
                <button class="tab-btn" onclick="switchTab('probability', this)">🎰 機率計算</button>
                <button class="tab-btn" onclick="switchTab('translator', this)">🌐 翻譯</button>
                <button class="tab-btn" onclick="switchTab('todo', this)">📝 待辦</button>
                <button class="tab-btn" onclick="switchTab('notes', this)">📌 筆記</button>
                <button class="tab-btn" onclick="switchTab('timer', this)">⏱️ 計時</button>
                <button class="tab-btn" onclick="switchTab('expense', this)">💰 支出</button>
                <button class="tab-btn" onclick="switchTab('qrcode', this)">📱 二維碼</button>
                <button class="tab-btn" onclick="switchTab('password', this)">🔐 密碼</button>
                <button class="tab-btn" onclick="switchTab('health', this)">⚖️ 健康</button>
                <button class="tab-btn" onclick="switchTab('crypto', this)">🔒 加密</button>
                <button class="tab-btn" onclick="switchTab('fitness', this)">💪 健身</button>
                <button class="tab-btn" onclick="switchTab('stats', this)">📊 統計</button>
                <button class="tab-btn" onclick="switchTab('stumath', this)">📌 數學</button>
            </div>
        </div>

        <!-- ========== 1️⃣ 計算機 ========== -->
        <div id="calculator" class="tab-content active">
            <div class="card">
                <h2>🧮 計算機</h2>
                <input type="text" id="calcInput" placeholder="輸入計算式... 例如：5 + 3 * 2">
                <button onclick="calculateResult()">計算</button>
                <div id="calcResult" class="result-box" style="display: none;"></div>
            </div>
        </div>

        <!-- ========== 2️⃣ 單位轉換 ========== -->
        <div id="converter" class="tab-content">
            <div class="card">
                <h2>📏 單位轉換 (12+種轉換)</h2>
                
                <h3>溫度轉換</h3>
                <div class="input-row">
                    <div>
                        <label>攝氏度(°C)</label>
                        <input type="number" id="celsius" placeholder="輸入°C" onchange="convertTemp()">
                    </div>
                    <div>
                        <label>華氏度(°F)</label>
                        <input type="number" id="fahrenheit" placeholder="輸入°F" onchange="convertTemp()">
                    </div>
                </div>

                <h3>距離轉換</h3>
                <div class="input-row">
                    <div>
                        <label>公里(km)</label>
                        <input type="number" id="km" placeholder="輸入km" onchange="convertDistance()">
                    </div>
                    <div>
                        <label>英里(mi)</label>
                        <input type="number" id="mile" placeholder="輸入mi" onchange="convertDistance()">
                    </div>
                </div>

                <h3>重量轉換</h3>
                <div class="input-row">
                    <div>
                        <label>公斤(kg)</label>
                        <input type="number" id="kg" placeholder="輸入kg" onchange="convertWeight()">
                    </div>
                    <div>
                        <label>磅(lb)</label>
                        <input type="number" id="lb" placeholder="輸入lb" onchange="convertWeight()">
                    </div>
                </div>

                <h3>容積轉換</h3>
                <div class="input-row">
                    <div>
                        <label>公升(L)</label>
                        <input type="number" id="liter" placeholder="輸入L" onchange="convertVolume()">
                    </div>
                    <div>
                        <label>加侖(gal)</label>
                        <input type="number" id="gallon" placeholder="輸入gal" onchange="convertVolume()">
                    </div>
                </div>

                <h3>面積轉換</h3>
                <div class="input-row">
                    <div>
                        <label>平方米(m²)</label>
                        <input type="number" id="sqm" placeholder="輸入m²" onchange="convertArea()">
                    </div>
                    <div>
                        <label>平方英尺(ft²)</label>
                        <input type="number" id="sqft" placeholder="輸入ft²" onchange="convertArea()">
                    </div>
                </div>

                <h3>速度轉換</h3>
                <div class="input-row">
                    <div>
                        <label>公里/小時(km/h)</label>
                        <input type="number" id="kmh" placeholder="輸入km/h" onchange="convertSpeed()">
                    </div>
                    <div>
                        <label>英里/小時(mph)</label>
                        <input type="number" id="mph" placeholder="輸入mph" onchange="convertSpeed()">
                    </div>
                </div>
            </div>
        </div>

        <!-- ========== 3️⃣ 機率計算 (新增!) ========== -->
        <div id="probability" class="tab-content">
            <div class="card">
                <h2>🎰 機率計算 - 抽卡/抽獎系統</h2>
                
                <h3>基礎設定</h3>
                <div class="input-row-3">
                    <div>
                        <label>基礎出現率 (%)</label>
                        <input type="number" id="baseProbRate" value="0.6" placeholder="0.6" min="0.01" max="100" step="0.01">
                    </div>
                    <div>
                        <label>保底次數</label>
                        <input type="number" id="pityCount" value="90" placeholder="90" min="1" max="1000">
                    </div>
                    <div>
                        <label>增幅開始抽數</label>
                        <input type="number" id="softPityStart" value="74" placeholder="74" min="1" max="500">
                    </div>
                </div>

                <h3>計算設定</h3>
                <div class="input-row-3">
                    <div>
                        <label>未中獎時增幅倍數</label>
                        <input type="number" id="probMultiplier" value="2" placeholder="2" min="1" max="10" step="0.1">
                    </div>
                    <div>
                        <label>計畫抽取次數</label>
                        <input type="number" id="totalDraws" value="360" placeholder="360" min="1" max="10000">
                    </div>
                    <div>
                        <label>模擬次數(驗證)</label>
                        <input type="number" id="simulations" value="10000" placeholder="10000" min="100" max="100000">
                    </div>
                </div>

                <button onclick="calculateProbability()">📊 計算機率</button>
                <button onclick="simulatePulls()">🎲 模擬抽卡</button>
                <button onclick="clearProbabilityResults()">🗑️ 清除結果</button>

                <div id="probResult" class="result-box" style="display: none;"></div>
                <div id="simResult" class="result-box" style="display: none;"></div>
            </div>
        </div>

        <!-- ========== 4️⃣ 翻譯 ========== -->
        <div id="translator" class="tab-content">
            <div class="card">
                <h2>🌐 翻譯工具</h2>
                <textarea id="translateInput" placeholder="輸入要翻譯的文字..." rows="5"></textarea>
                <div class="input-row">
                    <div>
                        <label>源語言</label>
                        <select id="sourceLang">
                            <option value="zh-TW">繁體中文</option>
                            <option value="zh-CN">簡體中文</option>
                            <option value="en">英文</option>
                            <option value="ja">日文</option>
                            <option value="ko">韓文</option>
                        </select>
                    </div>
                    <div>
                        <label>目標語言</label>
                        <select id="targetLang">
                            <option value="en">英文</option>
                            <option value="zh-TW">繁體中文</option>
                            <option value="zh-CN">簡體中文</option>
                            <option value="ja">日文</option>
                            <option value="ko">韓文</option>
                        </select>
                    </div>
                </div>
                <button onclick="translateText()">翻譯</button>
                <div id="translateOutput" class="result-box" style="display: none;"></div>
            </div>
        </div>

        <!-- ========== 5️⃣ 待辦清單 ========== -->
        <div id="todo" class="tab-content">
            <div class="card">
                <h2>📝 待辦清單</h2>
                <div class="input-row">
                    <input type="text" id="todoInput" placeholder="輸入新任務..." onkeypress="if(event.key==='Enter')addTodo()">
                    <button onclick="addTodo()">➕ 新增</button>
                </div>
                <div id="todoList"></div>
            </div>
        </div>

        <!-- ========== 6️⃣ 筆記 ========== -->
        <div id="notes" class="tab-content">
            <div class="card">
                <h2>📌 筆記</h2>
                <input type="text" id="noteTitle" placeholder="標題...">
                <textarea id="noteContent" placeholder="內容..." rows="5"></textarea>
                <button onclick="addNote()">💾 保存筆記</button>
                <div id="notesList"></div>
            </div>
        </div>

        <!-- ========== 7️⃣ 計時器 ========== -->
        <div id="timer" class="tab-content">
            <div class="card">
                <h2>⏱️ 計時器</h2>
                <div class="input-row">
                    <div>
                        <label>分鐘</label>
                        <input type="number" id="timerMin" value="5" placeholder="分鐘" min="0">
                    </div>
                    <div>
                        <label>秒</label>
                        <input type="number" id="timerSec" value="0" placeholder="秒" min="0" max="59">
                    </div>
                </div>
                <div style="font-size: 4rem; text-align: center; margin: 30px 0; font-weight: bold; font-family: 'Courier New';" id="timerDisplay">05:00</div>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button onclick="startTimer()">▶️ 開始</button>
                    <button onclick="pauseTimer()">⏸️ 暫停</button>
                    <button onclick="resetTimer()">🔄 重置</button>
                </div>
            </div>
        </div>

        <!-- ========== 8️⃣ 支出記錄 ========== -->
        <div id="expense" class="tab-content">
            <div class="card">
                <h2>💰 支出記錄</h2>
                <div class="input-row">
                    <div>
                        <label>金額 (¥)</label>
                        <input type="number" id="expenseAmount" placeholder="金額" min="0" step="0.01">
                    </div>
                    <div>
                        <label>日期</label>
                        <input type="date" id="expenseDate">
                    </div>
                </div>
                <input type="text" id="expenseCategory" placeholder="分類 (例如：食物、交通)">
                <button onclick="addExpense()">📝 記錄支出</button>
                <div id="expenseList"></div>
            </div>
        </div>

        <!-- ========== 9️⃣ 二維碼 ========== -->
        <div id="qrcode" class="tab-content">
            <div class="card">
                <h2>📱 二維碼生成</h2>
                <textarea id="qrInput" placeholder="輸入要編碼的文字或URL..." rows="4"></textarea>
                <button onclick="generateQR()">🔄 生成二維碼</button>
                <div id="qrOutput" style="text-align: center; margin-top: 20px;"></div>
            </div>
        </div>

        <!-- ========== 🔟 密碼生成 ========== -->
        <div id="password" class="tab-content">
            <div class="card">
                <h2>🔐 密碼生成器</h2>
                <div class="input-row-3">
                    <div>
                        <label>密碼長度</label>
                        <input type="number" id="pwdLength" value="16" placeholder="16" min="8" max="64">
                    </div>
                    <div>
                        <label>包含大寫字母</label>
                        <input type="checkbox" id="pwdUppercase" checked>
                    </div>
                    <div>
                        <label>包含特殊符號</label>
                        <input type="checkbox" id="pwdSymbols" checked>
                    </div>
                </div>
                <button onclick="generatePasswords()">🔄 生成密碼</button>
                <div id="passwordList"></div>
            </div>
        </div>

        <!-- ========== 1️⃣1️⃣ 健康數據 ========== -->
        <div id="health" class="tab-content">
            <div class="card">
                <h2>⚖️ 健康計算 (BMI)</h2>
                <div class="input-row">
                    <div>
                        <label>身高 (cm)</label>
                        <input type="number" id="bmiHeight" placeholder="身高" min="50" max="300">
                    </div>
                    <div>
                        <label>體重 (kg)</label>
                        <input type="number" id="bmiWeight" placeholder="體重" min="20" max="500" step="0.1">
                    </div>
                </div>
                <button onclick="calculateBMI()">📊 計算BMI</button>
                <div id="bmiResult" class="result-box" style="display: none;"></div>
            </div>
        </div>

        <!-- ========== 1️⃣2️⃣ 加密 ========== -->
        <div id="crypto" class="tab-content">
            <div class="card">
                <h2>🔒 加密/解密工具</h2>
                <textarea id="cryptoInput" placeholder="輸入文字..." rows="4"></textarea>
                <div class="input-row">
                    <button onclick="encryptText()">🔐 加密 (Base64)</button>
                    <button onclick="decryptText()">🔓 解密 (Base64)</button>
                </div>
                <div id="cryptoOutput" class="result-box" style="display: none;"></div>
            </div>
        </div>

        <!-- ========== 1️⃣3️⃣ 健身記錄 ========== -->
        <div id="fitness" class="tab-content">
            <div class="card">
                <h2>💪 健身記錄</h2>
                <div class="input-row">
                    <div>
                        <label>日期</label>
                        <input type="date" id="fitnessDate">
                    </div>
                    <div>
                        <label>運動項目</label>
                        <input type="text" id="fitnessExercise" placeholder="例如：跑步、游泳">
                    </div>
                </div>
                <div class="input-row">
                    <div>
                        <label>時間 (分鐘)</label>
                        <input type="number" id="fitnessDuration" placeholder="時間" min="1" max="480">
                    </div>
                    <div>
                        <label>卡路里</label>
                        <input type="number" id="fitnessCalorie" placeholder="卡路里" min="0" step="10">
                    </div>
                </div>
                <button onclick="addFitness()">➕ 記錄</button>
                <div id="fitnessList"></div>
            </div>
        </div>

        <!-- ========== 1️⃣4️⃣ 統計分析 ========== -->
        <div id="stats" class="tab-content">
            <div class="card">
                <h2>📊 統計分析</h2>
                <button onclick="showStats()">📈 生成報告</button>
                <div id="statsOutput"></div>
            </div>
        </div>
    </div>
        <!-- ========== 1️⃣5️⃣ 數學計算 ========== -->
        <div id="stumath" class="tab-content">
        <h2>微積分工具箱 🚀</h2>
        
        <div class="input-group">
            <label for="functionInput">輸入函數 f(x) (例如: x^3 - 2*x^2 + x):</label>
            <input type="text" id="functionInput" value="x^3 - 2*x^2 + x">
        </div>
        
        <div class="input-group">
            <label for="pointInput">輸入計算點 a (x 座標):</label>
            <input type="number" id="pointInput" value="1" step="any">
        </div>
        
        <button onclick="calculateCalculus()">計算導函數與切線</button>

        <div id="resultArea" class="result">
            <p><strong>原函數 $f(x)$：</strong> <span id="resFunc"></span></p>
            <p><strong>導函數 $f'(x)$：</strong> <span id="resDeriv"></span></p>
            <hr>
            <p><strong>函數值 $f(a)$：</strong> <span id="resVal"></span></p>
            <p><strong>切線斜率 $m$：</strong> <span id="resSlope"></span></p>
            <p><strong>切線方程式：</strong> <br><span id="resTangent" class="highlight"></span></p>
        </div>
         </div>
    <script>

        // ==================== 標籤切換 ====================

        // ==================== 3️⃣ 機率計算 (核心功能!) ====================
        /**
         * 機率計算核心邏輯 - 已修復
         * - 支持軟保底（在指定抽數後增加機率）
         * - 支持硬保底（到達保底次數必定獲得）
         * - 計算期望值和概率分佈
         */
        function calculateProbability() {
            try {
                const baseRate = parseFloat(document.getElementById('baseProbRate').value) / 100;
                const pityCount = parseInt(document.getElementById('pityCount').value);
                const softPityStart = parseInt(document.getElementById('softPityStart').value);
                const multiplier = parseFloat(document.getElementById('probMultiplier').value);
                const totalDraws = parseInt(document.getElementById('totalDraws').value);

                if (isNaN(baseRate) || isNaN(pityCount) || baseRate <= 0 || softPityStart > pityCount) {
                    alert('請輸入有效的數據（軟保底必須小於硬保底）');
                    return;
                }

                const softPityChance = baseRate * multiplier;

                // ✅ 修復1：正確計算完整保底輪內的概率
                // 計算在一個完整保底輪（1-pityCount）內至少獲得一次的概率
                let probNoWinInPity = 1;
                for (let i = 1; i <= pityCount; i++) {
                    let currentProb = (i >= softPityStart) ? softPityChance : baseRate;
                    if (i === pityCount) currentProb = 1; // 硬保底
                    probNoWinInPity *= (1 - currentProb);
                }
                const probAtLeastOnceInPity = 1 - probNoWinInPity;

                // ✅ 修復2：計算期望獲得次數（正確版本）
                // 計算每個保底輪的平均獲得數
                let expectedPerPity = 0;
                let cumulativeProb = 1;
                for (let i = 1; i <= pityCount; i++) {
                    let currentProb = (i >= softPityStart) ? softPityChance : baseRate;
                    if (i === pityCount) currentProb = 1;
                    
                    // 在第 i 抽中獎的概率 = 前 i-1 抽都沒中 × 第 i 抽中
                    let winAtI = cumulativeProb * currentProb;
                    expectedPerPity += winAtI;
                    
                    cumulativeProb *= (1 - currentProb);
                }

                // 完整保底輪數和期望獲得
                const fullPityRounds = Math.floor(totalDraws / pityCount);
                const remainingDraws = totalDraws % pityCount;

                // 期望獲得 = 完整輪數 × 每輪期望 + 剩餘抽數的期望
                let expectedWins = fullPityRounds * expectedPerPity;

                // 計算剩餘抽數的期望
                let remainingExpected = 0;
                cumulativeProb = 1;
                for (let i = 1; i <= remainingDraws; i++) {
                    let currentProb = (i >= softPityStart) ? softPityChance : baseRate;
                    let winAtI = cumulativeProb * currentProb;
                    remainingExpected += winAtI;
                    cumulativeProb *= (1 - currentProb);
                }
                expectedWins += remainingExpected;

                // ✅ 修復3：計算軟保底前的概率
                let probNoWinBeforeSoftPity = Math.pow(1 - baseRate, softPityStart - 1);
                let probAtLeastOnceBeforeSoftPity = 1 - probNoWinBeforeSoftPity;

                // ✅ 修復4：計算至少中一次的正確概率
                let probNoWinAtAll = 1;
                let pityCounter = 0;
                for (let i = 0; i < totalDraws; i++) {
                    pityCounter++;
                    let currentProb = (pityCounter >= softPityStart) ? softPityChance : baseRate;
                    if (pityCounter >= pityCount) {
                        probNoWinAtAll = 0;
                        break;
                    }
                    probNoWinAtAll *= (1 - currentProb);
                }
                const probAtLeastOnceTotal = 1 - probNoWinAtAll;

                // 生成結果
                const probabilityDetails = `
                    <strong>📊 機率分析結果</strong><br><br>
                    <strong style="color: var(--primary);">基礎設定：</strong><br>
                    • 基礎出現率：${(baseRate * 100).toFixed(2)}%<br>
                    • 軟保底開始：第 ${softPityStart} 抽<br>
                    • 軟保底倍增：${multiplier}x (${(softPityChance * 100).toFixed(2)}%)<br>
                    • 硬保底次數：${pityCount} 抽<br><br>

                    <strong style="color: var(--primary);">在軟保底前 (1-${softPityStart - 1} 抽)：</strong><br>
                    • 不中獎概率：${(probNoWinBeforeSoftPity * 100).toFixed(2)}%<br>
                    • 至少中獎概率：${(probAtLeastOnceBeforeSoftPity * 100).toFixed(2)}%<br>
                    • 平均需要抽數：${(1 / baseRate).toFixed(1)} 抽<br><br>

                    <strong style="color: var(--primary);">在完整保底內 (1-${pityCount} 抽)：</strong><br>
                    • 至少中獎概率：${(probAtLeastOnceInPity * 100).toFixed(2)}%<br>
                    • 平均每輪獲得次數：${expectedPerPity.toFixed(2)} 個<br><br>

                    <strong style="color: var(--success); font-size: 1.2rem;">計畫抽取 ${totalDraws} 次的預測：</strong><br>
                    • 完整保底輪數：${fullPityRounds} 輪<br>
                    • 剩餘抽數：${remainingDraws} 抽<br>
                    • 預期獲得次數：<span style="color: var(--primary); font-size: 1.1rem;">${expectedWins.toFixed(2)}</span> 個<br>
                    • 預期範圍（保守）：${Math.floor(expectedWins)} - ${Math.ceil(expectedWins)} 個<br>
                    • 至少獲得1個的概率：${(probAtLeastOnceTotal * 100).toFixed(2)}%<br><br>

                    <strong style="color: var(--warning);">💡 提示：</strong><br>
                    • 期望值是平均情況，實際可能高於或低於此值<br>
                    • 軟保底區間 (${softPityStart}-${pityCount}) 每抽機率為基礎機率的 ${multiplier}x<br>
                    • 到達 ${pityCount} 抽時保證獲得 1 個大獎
                `;

                document.getElementById('probResult').innerHTML = probabilityDetails;
                document.getElementById('probResult').style.display = 'block';
                saveData();
            } catch (error) {
                alert('❌ 計算錯誤: ' + error.message);
                console.error(error);
            }
        }

        /**
         * 模擬抽卡 - 用隨機模擬驗證理論計算 (已修復)
         */
        function simulatePulls() {
            try {
                const baseRate = parseFloat(document.getElementById('baseProbRate').value) / 100;
                const pityCount = parseInt(document.getElementById('pityCount').value);
                const softPityStart = parseInt(document.getElementById('softPityStart').value);
                const multiplier = parseFloat(document.getElementById('probMultiplier').value);
                const totalDraws = parseInt(document.getElementById('totalDraws').value);
                const simCount = parseInt(document.getElementById('simulations').value);

                if (isNaN(simCount) || simCount < 100) {
                    alert('模擬次數至少需要 100');
                    return;
                }

                const softPityChance = baseRate * multiplier;
                const results = [];

                // 運行模擬
                for (let sim = 0; sim < simCount; sim++) {
                    let wins = 0;
                    let pityCounter = 0;

                    for (let draw = 0; draw < totalDraws; draw++) {
                        pityCounter++;
                        let currentProb;

                        // ✅ 修復5：正確判斷當前機率
                        if (pityCounter >= pityCount) {
                            // 硬保底
                            wins++;
                            pityCounter = 0;
                        } else if (pityCounter >= softPityStart) {
                            // 軟保底區間
                            currentProb = softPityChance;
                            if (Math.random() < currentProb) {
                                wins++;
                                pityCounter = 0;
                            }
                        } else {
                            // 正常區間
                            currentProb = baseRate;
                            if (Math.random() < currentProb) {
                                wins++;
                                pityCounter = 0;
                            }
                        }
                    }

                    results.push(wins);
                }

                // 計算統計數據
                const avgWins = results.reduce((a, b) => a + b, 0) / results.length;
                const maxWins = Math.max(...results);
                const minWins = Math.min(...results);
                const variance = results.reduce((sum, val) => sum + Math.pow(val - avgWins, 2), 0) / results.length;
                const stdDev = Math.sqrt(variance);

                // 分佈統計 (只顯示前15個)
                const distribution = {};
                results.forEach(w => {
                    distribution[w] = (distribution[w] || 0) + 1;
                });

                const sortedDistribution = Object.keys(distribution)
                    .map(Number)
                    .sort((a, b) => a - b);
                let distributionHTML = '<br><strong>獲得次數分佈（前15個）：</strong><br>';
                
                sortedDistribution.slice(0, 15).forEach(wins => {
                    const count = distribution[wins];
                    const percent = ((count / simCount) * 100).toFixed(2);
                    const barLength = Math.max(1, Math.floor(count / simCount * 50));
                    distributionHTML += `${wins}個: [${'█'.repeat(barLength)}] ${count}次 (${percent}%)<br>`;
                });

                const simResult = `
                    <strong>🎲 模擬結果 (${simCount.toLocaleString()} 次模擬)</strong><br><br>
                    <strong style="color: var(--primary);">統計數據：</strong><br>
                    • 平均獲得次數：<span style="color: var(--success); font-size: 1.1rem;">${avgWins.toFixed(2)}</span> 個<br>
                    • 最多獲得：${maxWins} 個<br>
                    • 最少獲得：${minWins} 個<br>
                    • 標準差（σ）：${stdDev.toFixed(2)}<br>
                    • 置信區間 (68%)：${(avgWins - stdDev).toFixed(1)} ~ ${(avgWins + stdDev).toFixed(1)} 個<br>
                    • 置信區間 (95%)：${(avgWins - 2 * stdDev).toFixed(1)} ~ ${(avgWins + 2 * stdDev).toFixed(1)} 個<br><br>
                    ${distributionHTML}
                `;

                document.getElementById('simResult').innerHTML = simResult;
                document.getElementById('simResult').style.display = 'block';
                saveData();
            } catch (error) {
                alert('❌ 模擬出錯: ' + error.message);
                console.error(error);
            }
        }

        function clearProbabilityResults() {
            document.getElementById('probResult').style.display = 'none';
            document.getElementById('simResult').style.display = 'none';
        }
        
        // ==================== 4️⃣ 翻譯 ====================
        function translateText() {
            try {
                const text = document.getElementById('translateInput').value.trim();
                if (!text) {
                    alert('請輸入要翻譯的文字');
                    return;
                }

                const sourceLang = document.getElementById('sourceLang').value;
                const targetLang = document.getElementById('targetLang').value;

                // 使用 MyMemory 翻譯 API（免費）
                const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${sourceLang}|${targetLang}`;

                fetch(url)
                    .then(r => r.json())
                    .then(data => {
                        if (data.responseStatus === 200) {
                            document.getElementById('translateOutput').innerHTML = `
                                <strong>📝 翻譯結果</strong><br><br>
                                <strong>原文 (${sourceLang})：</strong><br>
                                ${text}<br><br>
                                <strong style="color: var(--primary);">譯文 (${targetLang})：</strong><br>
                                ${data.responseData.translatedText}
                            `;
                        } else {
                            throw new Error('翻譯失敗');
                        }
                        document.getElementById('translateOutput').style.display = 'block';
                    })
                    .catch(err => {
                        document.getElementById('translateOutput').innerHTML = 
                            `<strong style="color: var(--danger);">❌ 翻譯出錯：${err.message}</strong>`;
                        document.getElementById('translateOutput').style.display = 'block';
                    });
            } catch (error) {
                alert('❌ 出錯: ' + error.message);
            }
        }

        // ==================== 5️⃣ 待辦清單 ====================
        function addTodo() {
            try {
                const input = document.getElementById('todoInput').value.trim();
                if (!input) return;

                state.todos.push({
                    id: Date.now(),
                    text: input,
                    done: false,
                    createdAt: new Date().toLocaleString()
                });

                document.getElementById('todoInput').value = '';
                renderTodos();
                saveData();
            } catch (error) {
                console.error('添加待辦出錯:', error);
            }
        }

        function renderTodos() {
            const list = document.getElementById('todoList');
            if (state.todos.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: var(--text-light);">還沒有任務</p>';
                return;
            }

            list.innerHTML = state.todos.map(todo => `
                <div class="list-item" style="opacity: ${todo.done ? 0.6 : 1};">
                    <span style="flex: 1;">
                        <input type="checkbox" ${todo.done ? 'checked' : ''} 
                               onchange="toggleTodo(${todo.id})"
                               style="margin-right: 10px; cursor: pointer;">
                        <span style="text-decoration: ${todo.done ? 'line-through' : 'none'};">
                            ${todo.text}
                        </span>
                    </span>
                    <button onclick="deleteTodo(${todo.id})" class="btn-secondary" 
                            style="padding: 5px 10px; font-size: 0.9rem;">🗑️ 刪</button>
                </div>
            `).join('');
        }

        function toggleTodo(id) {
            const todo = state.todos.find(t => t.id === id);
            if (todo) {
                todo.done = !todo.done;
                renderTodos();
                saveData();
            }
        }

        function deleteTodo(id) {
            state.todos = state.todos.filter(t => t.id !== id);
            renderTodos();
            saveData();
        }

        function addNote() {
            try {
                const title = document.getElementById('noteTitle').value.trim();
                const content = document.getElementById('noteContent').value.trim();

                if (!title || !content) {
                    alert('請輸入標題和內容');
                    return;
                }

                state.notes.push({
                    id: Date.now(),
                    title,
                    content,
                    createdAt: new Date().toLocaleString()
                });

                document.getElementById('noteContent').value = '';
                renderNotes();
                saveData();

        function renderNotes() {
            const list = document.getElementById('notesList');
            if (state.notes.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: var(--text-light);">還沒有筆記</p>';
                return;
            }

            list.innerHTML = state.notes.map(note => `
                <div class="list-item" style="flex-direction: column; align-items: flex-start;">
                    <div style="width: 100%; display: flex; justify-content: space-between; align-items: center;">
                        <h3 style="margin: 0; color: var(--primary);">${note.title}</h3>
                        <button onclick="deleteNote(${note.id})" class="btn-secondary" 
                                style="padding: 5px 10px; font-size: 0.9rem;">🗑️ 刪</button>
                    </div>
                    <p style="margin: 8px 0; white-space: pre-wrap; color: var(--text-light); font-size: 0.95rem;">${note.content.substring(0, 100)}...</p>
                    <span style="font-size: 0.85rem; color: var(--text-light);">${note.createdAt}</span>
                </div>

        function deleteNote(id) {
            state.notes = state.notes.filter(n => n.id !== id);
            renderNotes();
            saveData();
        }

        // ==================== 7️⃣ 計時器 ====================
        function startTimer() {
            if (state.isTimerRunning) return;

            const min = parseInt(document.getElementById('timerMin').value) || 0;
            const sec = parseInt(document.getElementById('timerSec').value) || 0;
            state.timerSeconds = min * 60 + sec;

            if (state.timerSeconds <= 0) {
                alert('請輸入有效的時間');
                return;
            }

            state.isTimerRunning = true;
            updateTimerDisplay();

            state.timerInterval = setInterval(() => {
                state.timerSeconds--;
                updateTimerDisplay();

                if (state.timerSeconds <= 0) {
                    clearInterval(state.timerInterval);
                    state.isTimerRunning = false;
                    playNotification();
                    alert('⏰ 時間到！');
                }
            }, 1000);
        }

        function pauseTimer() {
            state.isTimerRunning = false;
            clearInterval(state.timerInterval);
        }

        function resetTimer() {
            state.isTimerRunning = false;
            clearInterval(state.timerInterval);
            state.timerSeconds = 0;
            document.getElementById('timerDisplay').textContent = '00:00';
        }

        function updateTimerDisplay() {
            const min = Math.floor(state.timerSeconds / 60);
            const sec = state.timerSeconds % 60;
            document.getElementById('timerDisplay').textContent = 
                `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
        }

        function playNotification() {
            // 簡單的提示音（如果瀏覽器允許）
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.frequency.value = 800;
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        // ==================== 8️⃣ 支出記錄 ====================
        function addExpense() {
            try {
                const amount = parseFloat(document.getElementById('expenseAmount').value);
                const category = document.getElementById('expenseCategory').value.trim() || '其他';

                if (!amount || amount <= 0) {
                    alert('請輸入有效的金額');
                    return;
                }

                state.expenses.push({
                    id: Date.now(),
                    amount,
                    category,
                    date: new Date().toLocaleDateString(),
                    timestamp: new Date()
                });

                document.getElementById('expenseAmount').value = '';
                document.getElementById('expenseCategory').value = '';
                renderExpenses();
                saveData();

                console.error('添加支出出錯:', error);
            }

        function renderExpenses() {

                list.innerHTML = '<p style="text-align: center; color: var(--text-light);">還沒有記錄支出</p>';

            });

            });

                <div class="stat-box">

                    <div class="list-item">
                        <span>

                            <span style="color: var(--text-light); font-size: 0.9rem;">${e.date}</span>
                        </span>
                        <span style="text-align: right;">
                            <strong style="color: var(--primary); font-size: 1.1rem;">¥${e.amount.toFixed(2)}</strong><br>

        function deleteExpense(id) {
            state.expenses = state.expenses.filter(e => e.id !== id);
            renderExpenses();
            saveData();
        }

        // ==================== 9️⃣ 二維碼 ====================
        function generateQR() {
            try {
                const text = document.getElementById('qrInput').value.trim();
                if (!text) {
                    alert('請輸入要編碼的文字');
                    return;
                }

                document.getElementById('qrOutput').innerHTML = '';
                new QRCode(document.getElementById('qrOutput'), {
                    text: text,
                    width: 256,
                    height: 256,
                    colorDark: '#667eea',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.H

                alert('❌ 生成二維碼失敗: ' + error.message);

        // ==================== 🔟 密碼生成 ====================
        function generatePasswords() {
            try {
                const length = parseInt(document.getElementById('pwdLength').value) || 16;
                const useUppercase = document.getElementById('pwdUppercase').checked;
                const useSymbols = document.getElementById('pwdSymbols').checked;

                let chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
                if (useUppercase) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
                if (useSymbols) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';

                let passwords = [];
                for (let i = 0; i < 5; i++) {
                    let pwd = '';
                    for (let j = 0; j < length; j++) {
                        pwd += chars.charAt(Math.floor(Math.random() * chars.length));
                    }
                    passwords.push(pwd);
                }

                document.getElementById('passwordList').innerHTML = passwords.map((pwd, i) => `
                    <div class="list-item">
                        <code style="font-family: 'Courier New'; letter-spacing: 1px;">${pwd}</code>
                        <button onclick="navigator.clipboard.writeText('${pwd}'); alert('已複製!')" 
                                class="btn-secondary" style="padding: 5px 10px; font-size: 0.9rem;">📋 複製</button>
                    </div>
                `).join('');
            } catch (error) {
                alert('❌ 生成密碼失敗: ' + error.message);
            }
        }

        // ==================== 1️⃣1️⃣ 健康 ====================
        function calculateBMI() {
            try {
                const height = parseFloat(document.getElementById('bmiHeight').value);
                const weight = parseFloat(document.getElementById('bmiWeight').value);

                if (!height || !weight || height <= 0 || weight <= 0) {
                    alert('請輸入有效的身高和體重');
                    return;
                }

                const heightM = height / 100;
                const bmi = weight / (heightM * heightM);
                let category = '';
                let color = '';

                if (bmi < 18.5) {
                    category = '體重過輕 ⚠️';
                    color = '#ffd93d';
                } else if (bmi < 25) {
                    category = '正常體重 ✅';
                    color = '#4caf50';
                } else if (bmi < 30) {
                    category = '體重過重 ⚠️';
                    color = '#ffd93d';
                } else {
                    category = '肥胖 ❌';
                    color = '#ff6b6b';
                }

                document.getElementById('bmiResult').innerHTML = `
                    <strong style="font-size: 1.2rem;">BMI: ${bmi.toFixed(1)}</strong><br>
                    <strong style="color: ${color}; font-size: 1.1rem;">分類：${category}</strong><br><br>
                    <span style="color: var(--text-light); font-size: 0.95rem;">
                    • 身高：${height} cm<br>
                    • 體重：${weight} kg<br>
                    • BMI 計算公式：體重(kg) ÷ 身高(m)²
                    </span>
                `;
                document.getElementById('bmiResult').style.display = 'block';
            } catch (error) {
                alert('❌ 計算失敗: ' + error.message);
            }
        }

        // ==================== 1️⃣2️⃣ 加密 ====================
        function encryptText() {
            try {
                const text = document.getElementById('cryptoInput').value;
                if (!text) {
                    alert('請輸入文字');
                    return;
                }

                const encrypted = btoa(text);
                document.getElementById('cryptoOutput').innerHTML = `
                    <strong>🔐 加密結果 (Base64)：</strong><br>
                    <code style="word-break: break-all; font-family: 'Courier New';">${encrypted}</code><br><br>
                    <button onclick="navigator.clipboard.writeText('${encrypted}'); alert('已複製!')" 
                            class="btn-secondary" style="margin-top: 10px;">📋 複製加密結果</button>
                `;
                document.getElementById('cryptoOutput').style.display = 'block';
            } catch (error) {
                alert('❌ 加密失敗: ' + error.message);
            }
        }

        function decryptText() {
            try {
                const text = document.getElementById('cryptoInput').value;
                if (!text) {
                    alert('請輸入加密文字');
                    return;
                }

                const decrypted = atob(text);
                document.getElementById('cryptoOutput').innerHTML = `
                    <strong>🔓 解密結果：</strong><br>
                    <code style="word-break: break-all; font-family: 'Courier New';">${decrypted}</code><br><br>
                    <button onclick="navigator.clipboard.writeText('${decrypted}'); alert('已複製!')" 
                            class="btn-secondary" style="margin-top: 10px;">📋 複製解密結果</button>
                `;
                document.getElementById('cryptoOutput').style.display = 'block';
            } catch (error) {
                document.getElementById('cryptoOutput').innerHTML = 
                    '<strong style="color: var(--danger);">❌ 解密失敗：輸入不是有效的 Base64 編碼</strong>';
                document.getElementById('cryptoOutput').style.display = 'block';
            }
        }

        // ==================== 1️⃣3️⃣ 健身 ====================

                            <button onclick="deleteFitness(${f.id})" class="btn-secondary"

        // ==================== 1️⃣4️⃣ 統計 ====================
        function showStats() {
            try {

        // ==================== 1️⃣5️⃣ 數學計算 ====================
                // 核心微積分與幾何處理函數
function calculateCalculus() {
    try {
        // 1. 取得 DOM 元素與使用者輸入
        const funcStr = document.getElementById('functionInput').value;
        const a = parseFloat(document.getElementById('pointInput').value);

        // 顯示結果區塊
        const resultArea = document.getElementById('resultArea');
        resultArea.style.display = 'block';

        // 2. 符號運算：解析函數並求導數
        // 利用 math.js 的 derivative 進行偏微分/常微分
        const node = math.parse(funcStr);
        const derivativeNode = math.derivative(node, 'x');
        
        // 將抽象語法樹 (AST) 轉回人類可讀的字串
        const derivStr = derivativeNode.toString();

        // 3. 數值運算：計算 f(a) 與斜率 f'(a)
        // 將函數編譯為可執行的 JavaScript 程式碼
        const compiledFunc = node.compile();
        const compiledDeriv = derivativeNode.compile();

        // 設定變數 x 的環境值
        const scope = { x: a };
        const fa = compiledFunc.evaluate(scope);      // y 座標
        const slope = compiledDeriv.evaluate(scope);  // 切線斜率 m

        // 4. 代數推導：組合切線方程式
        // 點斜式: y - f(a) = m * (x - a)
        // 展開為: y = m*x - m*a + f(a)
        let intercept = fa - slope * a; // 計算 y 截距
        
        // 處理顯示的格式，讓正負號更美觀，並四捨五入到小數點後 4 位
        let mStr = math.round(slope, 4);
        let bStr = math.round(intercept, 4);
        
        let tangentEq = "";
        if (slope === 0) {
            tangentEq = `y = ${bStr} (水平切線)`;
        } else {
            let interceptDisplay = intercept >= 0 ? `+ ${bStr}` : `- ${Math.abs(bStr)}`;
            tangentEq = `y = ${mStr}x ${interceptDisplay}`;
        }

        // 5. 更新網頁結果
        document.getElementById('resFunc').innerText = funcStr;
        document.getElementById('resDeriv').innerText = derivStr;
        document.getElementById('resVal').innerText = math.round(fa, 4);
        document.getElementById('resSlope').innerText = mStr;
        document.getElementById('resTangent').innerText = tangentEq;

    }  catch (error) {
        // 錯誤攔截：若使用者輸入不符合數學語法 (例如漏寫乘號)
        alert("數學式解析錯誤！請確保格式正確，例如 2x 請寫成 2*x。");
        console.error("運算錯誤:", error);
    }
}


        // ==================== 深色模式 ====================
        function toggleDarkMode() {
            state.darkMode = !state.darkMode;
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', state.darkMode);
        }

        function loadDarkMode() {
            const saved = localStorage.getItem('darkMode');
            if (saved === 'true') {
                state.darkMode = true;
                document.body.classList.add('dark-mode');
            }
        }

        // ==================== 數據存儲 ====================
        function saveData() {
            try {
                localStorage.setItem('appState', JSON.stringify(state));
            } catch (error) {
                console.error('保存數據失敗:', error);
            }
        }

        function loadData() {
            try {
                const saved = localStorage.getItem('appState');
                if (saved) {
                    const loaded = JSON.parse(saved);
                    Object.assign(state, loaded);
                    // 重新渲染所有列表
                    if (state.todos.length > 0) renderTodos();
                    if (state.notes.length > 0) renderNotes();
                    if (state.expenses.length > 0) renderExpenses();
                    if (state.fitness.length > 0) renderFitness();
                }
            } catch (error) {
                console.error('加載數據失敗:', error);
            }
        }

        function exportData() {
            try {
                const dataStr = JSON.stringify(state, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `生活工具套件數據備份_${new Date().toLocaleDateString()}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                alert('✅ 數據已導出');
            } catch (error) {
                alert('❌ 導出失敗: ' + error.message);
            }
        }

        function importData() {
            try {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                input.onchange = e => {
                    const file = e.target.files[0];
                    const reader = new FileReader();
                    reader.onload = event => {
                        try {
                            const imported = JSON.parse(event.target.result);
                            Object.assign(state, imported);
                            saveData();
                            location.reload();
                            alert('✅ 數據導入成功！');
                        } catch (error) {
                            alert('❌ 導入失敗：文件格式不正確');
                        }
                    };
                    reader.readAsText(file);
                };
                document.body.appendChild(input);
                input.click();
                document.body.removeChild(input);
            } catch (error) {
                alert('❌ 導入失敗: ' + error.message);
            }
        }
    </script>
