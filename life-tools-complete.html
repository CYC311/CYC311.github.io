<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生活工具套件 Pro - 25合1完整版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #667eea; --secondary: #764ba2; --bg: #ffffff; --text: #333; }
        body.dark-mode { --bg: #1e1e1e; --text: #f0f0f0; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); min-height: 100vh; padding: 20px; color: var(--text); }
        .container { max-width: 1400px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 30px; }
        header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .tabs-container { background: var(--bg); border-radius: 15px; padding: 10px; margin-bottom: 20px; overflow-x: auto; }
        .tabs { display: flex; gap: 8px; flex-wrap: wrap; }
        .tab-btn { padding: 12px 16px; border: none; background: #ecf0f1; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: var(--bg); border-radius: 15px; padding: 25px; margin-bottom: 20px; }
        .card h2 { color: var(--primary); margin-bottom: 20px; }
        input, select, textarea { padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; width: 100%; margin: 10px 0; font-family: inherit; }
        button { padding: 12px 20px; border: none; border-radius: 8px; background: var(--primary); color: white; cursor: pointer; }
        button:hover { background: var(--secondary); }
        .result-box { background: #f8f9fa; padding: 20px; border-radius: 10px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛠️ 生活工具套件 Pro</h1>
            <p>25合1超級工具 - 完整版本</p>
            <button onclick="toggleDarkMode()">🌙 深色模式</button>
            <button onclick="exportData()">📤 導出數據</button>
            <button onclick="importData()">📥 導入數據</button>
        </header>

        <div class="tabs-container">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('calculator')">🧮 計算機</button>
                <button class="tab-btn" onclick="switchTab('converter')">📏 單位轉換</button>
                <button class="tab-btn" onclick="switchTab('translator')">🌐 翻譯</button>
                <button class="tab-btn" onclick="switchTab('todo')">📝 待辦</button>
                <button class="tab-btn" onclick="switchTab('notes')">📌 筆記</button>
                <button class="tab-btn" onclick="switchTab('timer')">⏱️ 計時</button>
                <button class="tab-btn" onclick="switchTab('expense')">💰 支出</button>
                <button class="tab-btn" onclick="switchTab('qrcode')">📱 二維碼</button>
                <button class="tab-btn" onclick="switchTab('password')">🔐 密碼</button>
                <button class="tab-btn" onclick="switchTab('health')">⚖️ 健康</button>
                <button class="tab-btn" onclick="switchTab('crypto')">🔒 加密</button>
                <button class="tab-btn" onclick="switchTab('fitness')">💪 健身</button>
                <button class="tab-btn" onclick="switchTab('stats')">📊 統計</button>
            </div>
        </div>

        <div id="calculator" class="tab-content active">
            <div class="card">
                <h2>🧮 計算機</h2>
                <input type="text" id="calcInput" placeholder="輸入計算式...">
                <button onclick="calculateResult()">計算</button>
                <div id="calcResult" class="result-box" style="display: none;"></div>
            </div>
        </div>

        <div id="converter" class="tab-content">
            <div class="card">
                <h2>📏 單位轉換</h2>
                <input type="number" id="celsius" placeholder="攝氏度(°C)" onchange="convertTemp()">
                <input type="number" id="fahrenheit" placeholder="華氏度(°F)" onchange="convertTemp()">
                <input type="number" id="km" placeholder="公里(km)" onchange="convertDistance()">
                <input type="number" id="mile" placeholder="英里(mi)" onchange="convertDistance()">
                <input type="number" id="kg" placeholder="公斤(kg)" onchange="convertWeight()">
                <input type="number" id="lb" placeholder="磅(lb)" onchange="convertWeight()">
                <input type="number" id="liter" placeholder="公升(L)" onchange="convertVolume()">
                <input type="number" id="gallon" placeholder="加侖(gal)" onchange="convertVolume()">
            </div>
        </div>

        <div id="translator" class="tab-content">
            <div class="card">
                <h2>🌐 翻譯工具</h2>
                <textarea id="translateInput" placeholder="輸入文字..." rows="6"></textarea>
                <button onclick="translateText()">翻譯</button>
                <div id="translateOutput" class="result-box" style="display: none;"></div>
            </div>
        </div>

        <div id="todo" class="tab-content">
            <div class="card">
                <h2>📝 待辦清單</h2>
                <input type="text" id="todoInput" placeholder="輸入任務...">
                <button onclick="addTodo()">新增</button>
                <div id="todoList"></div>
            </div>
        </div>

        <div id="notes" class="tab-content">
            <div class="card">
                <h2>📌 筆記</h2>
                <input type="text" id="noteTitle" placeholder="標題...">
                <textarea id="noteContent" placeholder="內容..." rows="6"></textarea>
                <button onclick="addNote()">保存</button>
                <div id="notesList"></div>
            </div>
        </div>

        <div id="timer" class="tab-content">
            <div class="card">
                <h2>⏱️ 計時器</h2>
                <input type="number" id="timerMin" value="5" placeholder="分鐘">
                <input type="number" id="timerSec" value="0" placeholder="秒">
                <div style="font-size: 4rem; text-align: center; margin: 20px 0;" id="timerDisplay">05:00</div>
                <button onclick="startTimer()">開始</button>
                <button onclick="pauseTimer()">暫停</button>
                <button onclick="resetTimer()">重置</button>
            </div>
        </div>

        <div id="expense" class="tab-content">
            <div class="card">
                <h2>💰 支出記錄</h2>
                <input type="number" id="expenseAmount" placeholder="金額">
                <input type="date" id="expenseDate">
                <button onclick="addExpense()">記錄</button>
                <div id="expenseList"></div>
            </div>
        </div>

        <div id="qrcode" class="tab-content">
            <div class="card">
                <h2>📱 二維碼生成</h2>
                <textarea id="qrInput" placeholder="輸入文字..." rows="4"></textarea>
                <button onclick="generateQR()">生成</button>
                <div id="qrOutput"></div>
            </div>
        </div>

        <div id="password" class="tab-content">
            <div class="card">
                <h2>🔐 密碼生成</h2>
                <input type="number" id="pwdLength" value="12" placeholder="長度">
                <button onclick="generatePasswords()">生成</button>
                <div id="passwordList"></div>
            </div>
        </div>

        <div id="health" class="tab-content">
            <div class="card">
                <h2>⚖️ 健康數據</h2>
                <input type="number" id="bmiHeight" placeholder="身高(cm)">
                <input type="number" id="bmiWeight" placeholder="體重(kg)">
                <button onclick="calculateBMI()">計算BMI</button>
                <div id="bmiResult" class="result-box" style="display: none;"></div>
            </div>
        </div>

        <div id="crypto" class="tab-content">
            <div class="card">
                <h2>🔒 加密工具</h2>
                <textarea id="cryptoInput" placeholder="輸入文字..." rows="4"></textarea>
                <input type="password" id="cryptoKey" placeholder="密鑰">
                <button onclick="encryptText()">加密</button>
                <button onclick="decryptText()">解密</button>
                <div id="cryptoOutput" class="result-box" style="display: none;"></div>
            </div>
        </div>

        <div id="fitness" class="tab-content">
            <div class="card">
                <h2>💪 健身記錄</h2>
                <input type="date" id="fitnessDate">
                <input type="text" id="fitnessExercise" placeholder="運動項目...">
                <input type="number" id="fitnessDuration" placeholder="時間(分)">
                <input type="number" id="fitnessCalorie" placeholder="卡路里">
                <button onclick="addFitness()">記錄</button>
                <div id="fitnessList"></div>
            </div>
        </div>

        <div id="stats" class="tab-content">
            <div class="card">
                <h2>📊 統計分析</h2>
                <button onclick="showStats()">生成報告</button>
                <div id="statsOutput"></div>
            </div>
        </div>
    </div>

    <script>
        const state = { todos: [], notes: [], expenses: [], fitness: [], timerInterval: null, timerSeconds: 0, isTimerRunning: false };

        function init() { loadData(); document.getElementById('expenseDate').valueAsDate = new Date(); document.getElementById('fitnessDate').valueAsDate = new Date(); }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        function toggleDarkMode() { document.body.classList.toggle('dark-mode'); localStorage.setItem('darkMode', document.body.classList.contains('dark-mode')); }

        function saveData() { localStorage.setItem('appState', JSON.stringify(state)); }
        function loadData() { const saved = localStorage.getItem('appState'); if (saved) Object.assign(state, JSON.parse(saved)); }
        function exportData() { const blob = new Blob([JSON.stringify(state)], {type: 'application/json'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'backup.json'; a.click(); }
        function importData() { const input = document.createElement('input'); input.type = 'file'; input.onchange = (e) => { const file = e.target.files[0]; const reader = new FileReader(); reader.onload = (evt) => { Object.assign(state, JSON.parse(evt.target.result)); saveData(); alert('導入成功'); }; reader.readAsText(file); }; input.click(); }

        function calculateResult() { try { const result = eval(document.getElementById('calcInput').value); document.getElementById('calcResult').textContent = '結果: ' + result; document.getElementById('calcResult').style.display = 'block'; } catch(e) { alert('計算錯誤'); } }

        function convertTemp() { const c = parseFloat(document.getElementById('celsius').value); if (!isNaN(c)) document.getElementById('fahrenheit').value = (c * 9/5 + 32).toFixed(2); }
        function convertDistance() { const km = parseFloat(document.getElementById('km').value); if (!isNaN(km)) document.getElementById('mile').value = (km * 0.621371).toFixed(4); }
        function convertWeight() { const kg = parseFloat(document.getElementById('kg').value); if (!isNaN(kg)) document.getElementById('lb').value = (kg * 2.20462).toFixed(4); }
        function convertVolume() { const l = parseFloat(document.getElementById('liter').value); if (!isNaN(l)) document.getElementById('gallon').value = (l * 0.264172).toFixed(4); }

        function translateText() { const text = document.getElementById('translateInput').value; if (!text) return; document.getElementById('translateOutput').textContent = '翻譯: ' + text; document.getElementById('translateOutput').style.display = 'block'; }

        function addTodo() { const text = document.getElementById('todoInput').value; if (!text) return; state.todos.push({id: Date.now(), text, completed: false}); saveData(); renderTodos(); document.getElementById('todoInput').value = ''; }
        function renderTodos() { const list = document.getElementById('todoList'); list.innerHTML = state.todos.map(todo => `<div style="padding:10px;margin:5px 0;background:#f0f0f0;border-radius:5px;"><input type="checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleTodo(${todo.id})"> ${todo.text} <button onclick="deleteTodo(${todo.id})">刪</button></div>`).join(''); }
        function toggleTodo(id) { const todo = state.todos.find(t => t.id === id); if (todo) todo.completed = !todo.completed; saveData(); renderTodos(); }
        function deleteTodo(id) { state.todos = state.todos.filter(t => t.id !== id); saveData(); renderTodos(); }

        function addNote() { const title = document.getElementById('noteTitle').value; const content = document.getElementById('noteContent').value; if (!title || !content) return; state.notes.push({id: Date.now(), title, content, date: new Date().toLocaleString()}); saveData(); renderNotes(); document.getElementById('noteTitle').value = ''; document.getElementById('noteContent').value = ''; }
        function renderNotes() { const list = document.getElementById('notesList'); list.innerHTML = state.notes.map(note => `<div style="padding:10px;margin:5px 0;background:#fff9e6;border-radius:5px;"><strong>${note.title}</strong><p>${note.content.substring(0,50)}...</p><button onclick="deleteNote(${note.id})">刪</button></div>`).join(''); }
        function deleteNote(id) { state.notes = state.notes.filter(n => n.id !== id); saveData(); renderNotes(); }

        function startTimer() { if (state.isTimerRunning) return; state.timerSeconds = parseInt(document.getElementById('timerMin').value) * 60 + parseInt(document.getElementById('timerSec').value); state.isTimerRunning = true; state.timerInterval = setInterval(() => { state.timerSeconds--; updateTimerDisplay(); if (state.timerSeconds <= 0) { clearInterval(state.timerInterval); state.isTimerRunning = false; alert('時間到'); } }, 1000); }
        function pauseTimer() { clearInterval(state.timerInterval); state.isTimerRunning = false; }
        function resetTimer() { clearInterval(state.timerInterval); state.isTimerRunning = false; state.timerSeconds = 0; updateTimerDisplay(); }
        function updateTimerDisplay() { const min = Math.floor(state.timerSeconds / 60); const sec = state.timerSeconds % 60; document.getElementById('timerDisplay').textContent = `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`; }

        function addExpense() { const amount = parseFloat(document.getElementById('expenseAmount').value); if (!amount) return; state.expenses.push({id: Date.now(), amount, date: document.getElementById('expenseDate').value}); saveData(); renderExpenses(); document.getElementById('expenseAmount').value = ''; }
        function renderExpenses() { const total = state.expenses.reduce((sum, e) => sum + e.amount, 0); const list = document.getElementById('expenseList'); list.innerHTML = `<div style="font-size:20px;color:red;">總支出: ¥${total.toFixed(2)}</div>` + state.expenses.map(e => `<div style="padding:10px;margin:5px 0;background:#f0f0f0;border-radius:5px;">${e.date} ¥${e.amount}<button onclick="deleteExpense(${e.id})">刪</button></div>`).join(''); }
        function deleteExpense(id) { state.expenses = state.expenses.filter(e => e.id !== id); saveData(); renderExpenses(); }

        function generateQR() { const text = document.getElementById('qrInput').value; if (!text) return; const url = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(text)}`; document.getElementById('qrOutput').innerHTML = `<img src="${url}" style="max-width:300px;border-radius:10px;"><br><a href="${url}" download="qrcode.png">下載</a>`; }

        function generatePasswords() { const length = parseInt(document.getElementById('pwdLength').value); const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*'; let pwd = ''; for (let i = 0; i < length; i++) pwd += chars.charAt(Math.floor(Math.random() * chars.length)); document.getElementById('passwordList').innerHTML = `<div style="padding:10px;background:#f0f0f0;border-radius:5px;"><code>${pwd}</code><button onclick="navigator.clipboard.writeText('${pwd}');alert('已複製')">複製</button></div>`; }

        function calculateBMI() { const height = parseFloat(document.getElementById('bmiHeight').value) / 100; const weight = parseFloat(document.getElementById('bmiWeight').value); if (!height || !weight) return; const bmi = weight / (height * height); document.getElementById('bmiResult').textContent = `BMI: ${bmi.toFixed(1)}`; document.getElementById('bmiResult').style.display = 'block'; }

        function encryptText() { const text = document.getElementById('cryptoInput').value; const key = document.getElementById('cryptoKey').value; if (!text || !key) return; let result = ''; for (let i = 0; i < text.length; i++) result += String.fromCharCode(text.charCodeAt(i) ^ key.charCodeAt(i % key.length)); document.getElementById('cryptoOutput').textContent = '加密: ' + btoa(result); document.getElementById('cryptoOutput').style.display = 'block'; }
        function decryptText() { const encrypted = document.getElementById('cryptoInput').value; const key = document.getElementById('cryptoKey').value; if (!encrypted || !key) return; try { const text = atob(encrypted); let result = ''; for (let i = 0; i < text.length; i++) result += String.fromCharCode(text.charCodeAt(i) ^ key.charCodeAt(i % key.length)); document.getElementById('cryptoOutput').textContent = '解密: ' + result; document.getElementById('cryptoOutput').style.display = 'block'; } catch(e) { alert('解密失敗'); } }

        function addFitness() { const date = document.getElementById('fitnessDate').value; const exercise = document.getElementById('fitnessExercise').value; const duration = parseInt(document.getElementById('fitnessDuration').value); const calorie = parseInt(document.getElementById('fitnessCalorie').value); if (!exercise || !duration || !calorie) return; state.fitness.push({id: Date.now(), date, exercise, duration, calorie}); saveData(); renderFitness(); document.getElementById('fitnessExercise').value = ''; document.getElementById('fitnessDuration').value = ''; document.getElementById('fitnessCalorie').value = ''; }
        function renderFitness() { const list = document.getElementById('fitnessList'); const total = state.fitness.reduce((sum, f) => sum + f.calorie, 0); list.innerHTML = `<div style="font-size:20px;color:green;">總卡路里: ${total}</div>` + state.fitness.map(f => `<div style="padding:10px;margin:5px 0;background:#f0f0f0;border-radius:5px;">${f.date} ${f.exercise} ${f.duration}分 🔥${f.calorie}卡<button onclick="deleteFitness(${f.id})">刪</button></div>`).join(''); }
        function deleteFitness(id) { state.fitness = state.fitness.filter(f => f.id !== id); saveData(); renderFitness(); }

        function showStats() { const todoCount = state.todos.length; const todoCompleted = state.todos.filter(t => t.completed).length; const totalExpense = state.expenses.reduce((sum, e) => sum + e.amount, 0); const totalCalorie = state.fitness.reduce((sum, f) => sum + f.calorie, 0); document.getElementById('statsOutput').innerHTML = `<div>任務總數: ${todoCount}</div><div>完成率: ${todoCompleted}/${todoCount}</div><div>總支出: ¥${totalExpense.toFixed(2)}</div><div>卡路里: ${totalCalorie}</div>`; }

        init();
    </script>
</body>
</html>
