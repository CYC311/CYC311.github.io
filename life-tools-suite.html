<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生活工具套件 - All-in-One</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Noto Sans CJK TC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            background: white;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .tab-btn {
            padding: 12px 20px;
            border: none;
            background: #ecf0f1;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .tab-btn.active {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .tab-btn:hover {
            transform: translateY(-2px);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5rem;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        label {
            font-weight: bold;
            color: #555;
            font-size: 0.95rem;
        }

        input, select, textarea {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #ecf0f1;
            color: #555;
        }

        .btn-secondary:hover {
            background: #d5dbdb;
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
        }

        .btn-danger:hover {
            background: #e63946;
        }

        .btn-success {
            background: #4caf50;
            color: white;
        }

        .btn-success:hover {
            background: #388e3c;
        }

        .result-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            margin-top: 15px;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .weather-widget {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .weather-widget h3 {
            margin-bottom: 10px;
        }

        .temperature {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 10px 0;
        }

        .note-item {
            background: #fff9e6;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #ffd93d;
            display: flex;
            justify-content: space-between;
            align-items: start;
            gap: 10px;
        }

        .note-content {
            flex: 1;
        }

        .note-content h4 {
            margin-bottom: 5px;
            color: #333;
        }

        .note-content p {
            color: #666;
            margin: 0;
            word-break: break-word;
        }

        .note-time {
            font-size: 0.85rem;
            color: #999;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .table th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: bold;
        }

        .table td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }

        .table tr:hover {
            background: #f8f9fa;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .converter-result {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .tip-box {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #2196f3;
            margin-top: 15px;
        }

        .tip-box strong {
            color: #1565c0;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .input-row {
                grid-template-columns: 1fr;
            }

            .tabs {
                flex-direction: column;
            }

            .tab-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛠️ 生活工具套件</h1>
            <p>一站式解決日常需求 - 計算、轉換、筆記、提醒全搞定</p>
        </header>

        <!-- 標籤頁導航 -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('calculator')">🧮 計算���</button>
            <button class="tab-btn" onclick="switchTab('unit-converter')">📏 單位轉換</button>
            <button class="tab-btn" onclick="switchTab('todo')">📝 待辦清單</button>
            <button class="tab-btn" onclick="switchTab('notes')">📌 便簽筆記</button>
            <button class="tab-btn" onclick="switchTab('timer')">⏱️ 計時器</button>
            <button class="tab-btn" onclick="switchTab('expense')">💰 支出記錄</button>
            <button class="tab-btn" onclick="switchTab('qrcode')">📱 二維碼生成</button>
        </div>

        <!-- ========== 1. 計算機 ========== -->
        <div id="calculator" class="tab-content active">
            <div class="card">
                <h2>🧮 科學計算機</h2>
                <div class="input-group">
                    <label>計算式</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="calcInput" placeholder="輸入計算式..." style="flex: 1;">
                        <button class="btn-secondary" onclick="clearCalc()" style="flex: 0 0 auto;">清除</button>
                    </div>
                </div>
                
                <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px;">
                    <button class="btn-secondary" onclick="appendCalc('7')">7</button>
                    <button class="btn-secondary" onclick="appendCalc('8')">8</button>
                    <button class="btn-secondary" onclick="appendCalc('9')">9</button>
                    <button class="btn-secondary" onclick="appendCalc('/')">/</button>

                    <button class="btn-secondary" onclick="appendCalc('4')">4</button>
                    <button class="btn-secondary" onclick="appendCalc('5')">5</button>
                    <button class="btn-secondary" onclick="appendCalc('6')">6</button>
                    <button class="btn-secondary" onclick="appendCalc('*')">*</button>

                    <button class="btn-secondary" onclick="appendCalc('1')">1</button>
                    <button class="btn-secondary" onclick="appendCalc('2')">2</button>
                    <button class="btn-secondary" onclick="appendCalc('3')">3</button>
                    <button class="btn-secondary" onclick="appendCalc('-')">-</button>

                    <button class="btn-secondary" onclick="appendCalc('0')" style="grid-column: span 2;">0</button>
                    <button class="btn-secondary" onclick="appendCalc('.')">.</button>
                    <button class="btn-secondary" onclick="appendCalc('+')">+</button>
                </div>

                <button class="btn-primary" style="width: 100%; margin-bottom: 15px;" onclick="calculateResult()">=</button>
                <div id="calcResult" class="result-box" style="display: none;"></div>
            </div>
        </div>

        <!-- ========== 2. 單位轉換 ========== -->
        <div id="unit-converter" class="tab-content">
            <div class="card">
                <h2>📏 單位轉換工具</h2>
                
                <div style="margin-bottom: 20px;">
                    <h3>溫度轉換</h3>
                    <div class="input-row">
                        <div>
                            <label>攝氏度 (°C)</label>
                            <input type="number" id="celsius" placeholder="輸入攝氏度" onchange="convertTemperature()">
                        </div>
                        <div>
                            <label>華氏度 (°F)</label>
                            <input type="number" id="fahrenheit" placeholder="華氏度" onchange="convertTemperature()">
                        </div>
                    </div>
                </div>

                <hr style="margin: 20px 0; border: none; border-top: 1px solid #e0e0e0;">

                <div style="margin-bottom: 20px;">
                    <h3>長度轉換</h3>
                    <div class="input-row">
                        <div>
                            <label>公里 (km)</label>
                            <input type="number" id="kilometer" placeholder="輸入公里" onchange="convertLength()">
                        </div>
                        <div>
                            <label>英里 (mi)</label>
                            <input type="number" id="mile" placeholder="英里" onchange="convertLength()">
                        </div>
                    </div>
                </div>

                <hr style="margin: 20px 0; border: none; border-top: 1px solid #e0e0e0;">

                <div>
                    <h3>重量轉換</h3>
                    <div class="input-row">
                        <div>
                            <label>公斤 (kg)</label>
                            <input type="number" id="kilogram" placeholder="輸入公斤" onchange="convertWeight()">
                        </div>
                        <div>
                            <label>磅 (lb)</label>
                            <input type="number" id="pound" placeholder="磅" onchange="convertWeight()">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ========== 3. 待辦清單 ========== -->
        <div id="todo" class="tab-content">
            <div class="card">
                <h2>📝 待辦事項</h2>
                <div class="input-group">
                    <input type="text" id="todoInput" placeholder="輸入新任務..." onkeypress="if(event.key==='Enter') addTodo()">
                    <div class="input-row">
                        <select id="todoCategory">
                            <option value="工作">🏢 工作</option>
                            <option value="學習">📚 學習</option>
                            <option value="生活">🏠 生活</option>
                            <option value="其他">🔖 其他</option>
                        </select>
                        <select id="todoPriority">
                            <option value="低">🟢 低優先</option>
                            <option value="中" selected>🟡 中優先</option>
                            <option value="高">🔴 高優先</option>
                        </select>
                    </div>
                    <button class="btn-primary" onclick="addTodo()">➕ 新增任務</button>
                </div>

                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <button class="btn-secondary" onclick="filterTodo('all')">全部</button>
                    <button class="btn-secondary" onclick="filterTodo('pending')">待完成</button>
                    <button class="btn-secondary" onclick="filterTodo('completed')">已完成</button>
                </div>

                <div id="todoList"></div>
            </div>
        </div>

        <!-- ========== 4. 便簽筆記 ========== -->
        <div id="notes" class="tab-content">
            <div class="card">
                <h2>📌 便簽筆記</h2>
                <div class="input-group">
                    <input type="text" id="noteTitle" placeholder="筆記標題...">
                    <textarea id="noteContent" placeholder="輸入筆記內容..." rows="5" style="resize: vertical;"></textarea>
                    <button class="btn-primary" onclick="addNote()">💾 保存筆記</button>
                </div>

                <div id="notesList"></div>
            </div>
        </div>

        <!-- ========== 5. 計時器 ========== -->
        <div id="timer" class="tab-content">
            <div class="card">
                <h2>⏱️ 倒計時器</h2>
                <div class="input-row">
                    <div>
                        <label>分鐘</label>
                        <input type="number" id="timerMinutes" value="5" min="0" max="59">
                    </div>
                    <div>
                        <label>秒</label>
                        <input type="number" id="timerSeconds" value="0" min="0" max="59">
                    </div>
                </div>

                <div style="text-align: center; margin: 30px 0;">
                    <div style="font-size: 4rem; font-weight: bold; color: #667eea; font-family: 'Courier New';" id="timerDisplay">05:00</div>
                </div>

                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button class="btn-success" onclick="startTimer()" id="timerStartBtn">▶️ 開始</button>
                    <button class="btn-secondary" onclick="pauseTimer()" id="timerPauseBtn" style="display: none;">⏸️ 暫停</button>
                    <button class="btn-danger" onclick="resetTimer()">🔄 重置</button>
                </div>

                <div id="timerAlert" class="alert alert-info" style="display: none; margin-top: 20px;">
                    ⏰ 倒計時完成！
                </div>
            </div>
        </div>

        <!-- ========== 6. 支出記錄 ========== -->
        <div id="expense" class="tab-content">
            <div class="card">
                <h2>💰 支出記錄管理</h2>
                <div class="input-group">
                    <div class="input-row">
                        <div>
                            <label>金額</label>
                            <input type="number" id="expenseAmount" placeholder="輸入金額" min="0" step="0.01">
                        </div>
                        <div>
                            <label>日期</label>
                            <input type="date" id="expenseDate">
                        </div>
                    </div>

                    <div>
                        <label>分類</label>
                        <select id="expenseCategory">
                            <option value="食物">🍔 食物</option>
                            <option value="交通">🚗 交通</option>
                            <option value="購物">🛍️ 購物</option>
                            <option value="娛樂">🎬 娛樂</option>
                            <option value="醫療">🏥 醫療</option>
                            <option value="其他">🔖 其他</option>
                        </select>
                    </div>

                    <input type="text" id="expenseNote" placeholder="備註...">
                    <button class="btn-primary" onclick="addExpense()">➕ 記錄支出</button>
                </div>

                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <button class="btn-secondary" onclick="filterExpense('all')">全部</button>
                    <button class="btn-secondary" onclick="filterExpense('today')">今天</button>
                    <button class="btn-secondary" onclick="filterExpense('week')">本週</button>
                    <button class="btn-secondary" onclick="filterExpense('month')">本月</button>
                </div>

                <div style="background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 15px;">
                    <h3 style="margin-bottom: 10px;">📊 統計資訊</h3>
                    <div class="input-row">
                        <div>
                            <strong>總支出:</strong>
                            <div style="font-size: 1.5rem; color: #ff6b6b; font-weight: bold;" id="totalExpense">¥0.00</div>
                        </div>
                        <div>
                            <strong>項目數:</strong>
                            <div style="font-size: 1.5rem; color: #667eea; font-weight: bold;" id="expenseCount">0</div>
                        </div>
                    </div>
                </div>

                <table class="table" id="expenseTable">
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>分類</th>
                            <th>金額</th>
                            <th>備註</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="expenseBody"></tbody>
                </table>
            </div>
        </div>

        <!-- ========== 7. 二維碼生成 ========== -->
        <div id="qrcode" class="tab-content">
            <div class="card">
                <h2>📱 二維碼生成器</h2>
                <div class="input-group">
                    <textarea id="qrInput" placeholder="輸入文字、URL、聯絡資訊等..." rows="4"></textarea>
                    <button class="btn-primary" onclick="generateQR()">🔲 生成二維碼</button>
                </div>

                <div id="qrOutput" style="text-align: center; margin-top: 20px;"></div>

                <div class="tip-box">
                    <strong>💡 提示:</strong> 你可以輸入：
                    <ul style="margin: 10px 0 0 20px;">
                        <li>網址 (https://example.com)</li>
                        <li>電話號碼 (tel:+1234567890)</li>
                        <li>電郵 (mailto:email@example.com)</li>
                        <li>普通文本</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============ 全域設定 ============
        const state = {
            todos: [],
            notes: [],
            expenses: [],
            timerInterval: null,
            timerSeconds: 0,
            isTimerRunning: false
        };

        // 初始化
        function init() {
            loadData();
            setTodayDate();
            renderTodos();
            renderNotes();
            renderExpenses();
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        // ============ 本地存儲 ============
        function saveData() {
            localStorage.setItem('appState', JSON.stringify(state));
        }

        function loadData() {
            const saved = localStorage.getItem('appState');
            if (saved) {
                Object.assign(state, JSON.parse(saved));
            }
        }

        function setTodayDate() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('expenseDate').value = today;
        }

        // ============ 1. 計算��� ============
        function appendCalc(val) {
            const input = document.getElementById('calcInput');
            input.value += val;
        }

        function clearCalc() {
            document.getElementById('calcInput').value = '';
            document.getElementById('calcResult').style.display = 'none';
        }

        function calculateResult() {
            const input = document.getElementById('calcInput').value;
            try {
                const result = eval(input);
                const resultBox = document.getElementById('calcResult');
                resultBox.innerHTML = `<strong>結果:</strong> ${result}`;
                resultBox.style.display = 'block';
            } catch (e) {
                alert('計算式錯誤，請檢查');
            }
        }

        // ============ 2. 單位轉換 ============
        function convertTemperature() {
            const celsius = parseFloat(document.getElementById('celsius').value);
            const fahrenheit = parseFloat(document.getElementById('fahrenheit').value);

            if (!isNaN(celsius)) {
                const f = (celsius * 9/5) + 32;
                document.getElementById('fahrenheit').value = f.toFixed(2);
            } else if (!isNaN(fahrenheit)) {
                const c = (fahrenheit - 32) * 5/9;
                document.getElementById('celsius').value = c.toFixed(2);
            }
        }

        function convertLength() {
            const km = parseFloat(document.getElementById('kilometer').value);
            const mile = parseFloat(document.getElementById('mile').value);

            if (!isNaN(km)) {
                document.getElementById('mile').value = (km * 0.621371).toFixed(4);
            } else if (!isNaN(mile)) {
                document.getElementById('kilometer').value = (mile * 1.60934).toFixed(4);
            }
        }

        function convertWeight() {
            const kg = parseFloat(document.getElementById('kilogram').value);
            const lb = parseFloat(document.getElementById('pound').value);

            if (!isNaN(kg)) {
                document.getElementById('pound').value = (kg * 2.20462).toFixed(4);
            } else if (!isNaN(lb)) {
                document.getElementById('kilogram').value = (lb * 0.453592).toFixed(4);
            }
        }

        // ============ 3. 待辦清單 ============
        function addTodo() {
            const input = document.getElementById('todoInput');
            const category = document.getElementById('todoCategory').value;
            const priority = document.getElementById('todoPriority').value;

            if (!input.value.trim()) {
                alert('請輸入任務');
                return;
            }

            state.todos.push({
                id: Date.now(),
                text: input.value,
                category: category,
                priority: priority,
                completed: false,
                createdAt: new Date().toLocaleDateString('zh-TW')
            });

            saveData();
            renderTodos();
            input.value = '';
        }

        function deleteTodo(id) {
            state.todos = state.todos.filter(t => t.id !== id);
            saveData();
            renderTodos();
        }

        function toggleTodo(id) {
            const todo = state.todos.find(t => t.id === id);
            if (todo) {
                todo.completed = !todo.completed;
                saveData();
                renderTodos();
            }
        }

        function filterTodo(filter) {
            renderTodos(filter);
        }

        function renderTodos(filter = 'all') {
            const list = document.getElementById('todoList');
            let filtered = state.todos;

            if (filter === 'pending') {
                filtered = state.todos.filter(t => !t.completed);
            } else if (filter === 'completed') {
                filtered = state.todos.filter(t => t.completed);
            }

            if (filtered.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: #999;">沒有任務</p>';
                return;
            }

            list.innerHTML = filtered.map(todo => `
                <div class="note-item" style="background: ${todo.completed ? '#e8f5e9' : '#fff9e6'}; border-left-color: ${getPriorityColor(todo.priority)};">
                    <input type="checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleTodo(${todo.id})" style="margin-top: 5px;">
                    <div class="note-content" style="flex: 1;">
                        <h4 style="text-decoration: ${todo.completed ? 'line-through' : 'none'}; color: ${todo.completed ? '#999' : '#333'};">${todo.text}</h4>
                        <p style="font-size: 0.85rem; color: #666;">${todo.category} • ${todo.priority} • ${todo.createdAt}</p>
                    </div>
                    <button class="btn-danger" style="padding: 6px 12px; font-size: 0.9rem;" onclick="deleteTodo(${todo.id})">刪除</button>
                </div>
            `).join('');
        }

        // ============ 4. 便簽筆記 ============
        function addNote() {
            const title = document.getElementById('noteTitle').value.trim();
            const content = document.getElementById('noteContent').value.trim();

            if (!title || !content) {
                alert('請輸入標題和內容');
                return;
            }

            state.notes.push({
                id: Date.now(),
                title: title,
                content: content,
                createdAt: new Date().toLocaleString('zh-TW')
            });

            saveData();
            renderNotes();
            document.getElementById('noteTitle').value = '';
            document.getElementById('noteContent').value = '';
        }

        function deleteNote(id) {
            state.notes = state.notes.filter(n => n.id !== id);
            saveData();
            renderNotes();
        }

        function renderNotes() {
            const list = document.getElementById('notesList');
            
            if (state.notes.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: #999;">還沒有筆記</p>';
                return;
            }

            list.innerHTML = state.notes.map(note => `
                <div class="note-item">
                    <div class="note-content">
                        <h4>${note.title}</h4>
                        <p>${note.content}</p>
                        <div class="note-time">${note.createdAt}</div>
                    </div>
                    <button class="btn-danger" style="padding: 6px 12px; font-size: 0.9rem;" onclick="deleteNote(${note.id})">刪除</button>
                </div>
            `).join('');
        }

        // ============ 5. 計時器 ============
        function startTimer() {
            if (state.isTimerRunning) return;

            if (state.timerSeconds === 0) {
                const minutes = parseInt(document.getElementById('timerMinutes').value) || 0;
                const seconds = parseInt(document.getElementById('timerSeconds').value) || 0;
                state.timerSeconds = minutes * 60 + seconds;
            }

            if (state.timerSeconds <= 0) {
                alert('請設定時間');
                return;
            }

            state.isTimerRunning = true;
            document.getElementById('timerStartBtn').style.display = 'none';
            document.getElementById('timerPauseBtn').style.display = 'inline-block';
            document.getElementById('timerMinutes').disabled = true;
            document.getElementById('timerSeconds').disabled = true;

            state.timerInterval = setInterval(() => {
                state.timerSeconds--;
                updateTimerDisplay();

                if (state.timerSeconds <= 0) {
                    clearInterval(state.timerInterval);
                    state.isTimerRunning = false;
                    document.getElementById('timerAlert').style.display = 'block';
                    playNotification();
                    document.getElementById('timerStartBtn').style.display = 'inline-block';
                    document.getElementById('timerPauseBtn').style.display = 'none';
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(state.timerInterval);
            state.isTimerRunning = false;
            document.getElementById('timerStartBtn').style.display = 'inline-block';
            document.getElementById('timerPauseBtn').style.display = 'none';
        }

        function resetTimer() {
            clearInterval(state.timerInterval);
            state.isTimerRunning = false;
            state.timerSeconds = 0;
            document.getElementById('timerStartBtn').style.display = 'inline-block';
            document.getElementById('timerPauseBtn').style.display = 'none';
            document.getElementById('timerMinutes').disabled = false;
            document.getElementById('timerSeconds').disabled = false;
            document.getElementById('timerAlert').style.display = 'none';
            updateTimerDisplay();
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(state.timerSeconds / 60);
            const seconds = state.timerSeconds % 60;
            document.getElementById('timerDisplay').textContent = 
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function playNotification() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 1000;
            oscillator.type = 'sine';
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        // ============ 6. 支出記錄 ============
        function addExpense() {
            const amount = parseFloat(document.getElementById('expenseAmount').value);
            const date = document.getElementById('expenseDate').value;
            const category = document.getElementById('expenseCategory').value;
            const note = document.getElementById('expenseNote').value;

            if (!amount || !date) {
                alert('請輸入金額和日期');
                return;
            }

            state.expenses.push({
                id: Date.now(),
                amount: amount,
                date: date,
                category: category,
                note: note
            });

            saveData();
            renderExpenses();
            document.getElementById('expenseAmount').value = '';
            document.getElementById('expenseNote').value = '';
        }

        function deleteExpense(id) {
            state.expenses = state.expenses.filter(e => e.id !== id);
            saveData();
            renderExpenses();
        }

        function filterExpense(filter) {
            renderExpenses(filter);
        }

        function renderExpenses(filter = 'all') {
            const tbody = document.getElementById('expenseBody');
            let filtered = state.expenses;
            const today = new Date();

            if (filter === 'today') {
                const todayStr = today.toISOString().split('T')[0];
                filtered = state.expenses.filter(e => e.date === todayStr);
            } else if (filter === 'week') {
                const weekAgo = new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000);
                filtered = state.expenses.filter(e => new Date(e.date) >= weekAgo);
            } else if (filter === 'month') {
                filtered = state.expenses.filter(e => {
                    const eDate = new Date(e.date);
                    return eDate.getMonth() === today.getMonth() && eDate.getFullYear() === today.getFullYear();
                });
            }

            const total = filtered.reduce((sum, e) => sum + e.amount, 0);
            document.getElementById('totalExpense').textContent = `¥${total.toFixed(2)}`;
            document.getElementById('expenseCount').textContent = filtered.length;

            tbody.innerHTML = filtered.map(expense => `
                <tr>
                    <td>${expense.date}</td>
                    <td>${expense.category}</td>
                    <td style="color: #ff6b6b; font-weight: bold;">¥${expense.amount.toFixed(2)}</td>
                    <td>${expense.note || '-'}</td>
                    <td>
                        <button class="btn-danger" style="padding: 4px 8px; font-size: 0.85rem;" onclick="deleteExpense(${expense.id})">刪除</button>
                    </td>
                </tr>
            `).join('');
        }

        // ============ 7. 二維碼生成 ============
        function generateQR() {
            const text = document.getElementById('qrInput').value.trim();
            if (!text) {
                alert('請輸入內容');
                return;
            }

            const output = document.getElementById('qrOutput');
            const encodedText = encodeURIComponent(text);
            const qrCodeUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodedText}`;
            
            output.innerHTML = `
                <img src="${qrCodeUrl}" alt="QR Code" style="max-width: 300px; border-radius: 10px; border: 2px solid #667eea;">
                <br>
                <a href="${qrCodeUrl}" download="qrcode.png" class="btn-primary" style="display: inline-block; margin-top: 15px; text-decoration: none; padding: 10px 20px;">⬇️ 下載二維碼</a>
            `;
        }

        // ============ 工具函數 ============
        function getPriorityColor(priority) {
            const colors = { '高': '#ff6b6b', '中': '#ffd93d', '低': '#4caf50' };
            return colors[priority] || '#667eea';
        }

        // 初始化應用
        init();
    </script>
</body>
</html>
