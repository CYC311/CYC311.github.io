<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生活工具套件 Pro - 20+合1超級工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', 'Noto Sans CJK TC', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 30px; }
        header h1 { font-size: 2.5rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2); }
        header p { font-size: 1.1rem; opacity: 0.9; }
        .tabs-container { background: white; border-radius: 15px; padding: 10px; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1); margin-bottom: 20px; overflow-x: auto; }
        .tabs { display: flex; gap: 8px; flex-wrap: wrap; }
        .tab-btn { padding: 12px 16px; border: none; background: #ecf0f1; border-radius: 10px; cursor: pointer; font-weight: bold; transition: all 0.3s; font-size: 0.95rem; white-space: nowrap; }
        .tab-btn.active { background: #667eea; color: white; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        .tab-btn:hover { transform: translateY(-2px); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); margin-bottom: 20px; }
        .card h2 { color: #333; margin-bottom: 20px; font-size: 1.5rem; border-bottom: 3px solid #667eea; padding-bottom: 10px; }
        .input-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        label { font-weight: bold; color: #555; font-size: 0.95rem; }
        input, select, textarea { padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem; font-family: inherit; transition: border-color 0.3s; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #667eea; box-shadow: 0 0 5px rgba(102, 126, 234, 0.3); }
        button { padding: 12px 20px; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5568d3; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        .btn-secondary { background: #ecf0f1; color: #555; }
        .btn-secondary:hover { background: #d5dbdb; }
        .btn-danger { background: #ff6b6b; color: white; }
        .btn-danger:hover { background: #e63946; }
        .result-box { background: #f8f9fa; padding: 20px; border-radius: 10px; border-left: 4px solid #667eea; margin-top: 15px; font-size: 1.1rem; font-weight: bold; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .tip-box { background: #e3f2fd; padding: 15px; border-radius: 10px; border-left: 4px solid #2196f3; margin-top: 15px; }
        @media (max-width: 768px) { header h1 { font-size: 1.8rem; } .grid-2 { grid-template-columns: 1fr; } .input-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛠️ 生活工具套件 Pro</h1>
            <p>20+合1超級工具 - 增強版本，單位轉換+修復翻譯</p>
        </header>

        <div class="tabs-container">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('calculator')">🧮 計算機</button>
                <button class="tab-btn" onclick="switchTab('converter')">📏 單位轉換</button>
                <button class="tab-btn" onclick="switchTab('translator')">🌐 翻譯工具</button>
                <button class="tab-btn" onclick="switchTab('todo')">📝 待辦清單</button>
                <button class="tab-btn" onclick="switchTab('notes')">📌 便簽筆記</button>
                <button class="tab-btn" onclick="switchTab('timer')">⏱️ 計時器</button>
                <button class="tab-btn" onclick="switchTab('expense')">💰 支出記錄</button>
                <button class="tab-btn" onclick="switchTab('qrcode')">📱 二維碼</button>
                <button class="tab-btn" onclick="switchTab('password')">🔐 密碼生成</button>
                <button class="tab-btn" onclick="switchTab('bmi')">⚖️ BMI計算</button>
                <button class="tab-btn" onclick="switchTab('age')">🎂 年齡計算</button>
            </div>
        </div>

        <!-- 計算機 -->
        <div id="calculator" class="tab-content active">
            <div class="card">
                <h2>🧮 科學計算機</h2>
                <input type="text" id="calcInput" placeholder="輸入計算式..." style="font-size: 1.2rem; padding: 15px;">
                <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px;">
                    <button class="btn-secondary" onclick="appendCalc('7')">7</button>
                    <button class="btn-secondary" onclick="appendCalc('8')">8</button>
                    <button class="btn-secondary" onclick="appendCalc('9')">9</button>
                    <button class="btn-secondary" onclick="appendCalc('/')">/</button>
                    <button class="btn-secondary" onclick="appendCalc('4')">4</button>
                    <button class="btn-secondary" onclick="appendCalc('5')">5</button>
                    <button class="btn-secondary" onclick="appendCalc('6')">6</button>
                    <button class="btn-secondary" onclick="appendCalc('*')">*</button>
                    <button class="btn-secondary" onclick="appendCalc('1')">1</button>
                    <button class="btn-secondary" onclick="appendCalc('2')">2</button>
                    <button class="btn-secondary" onclick="appendCalc('3')">3</button>
                    <button class="btn-secondary" onclick="appendCalc('-')">-</button>
                    <button class="btn-secondary" onclick="appendCalc('0')" style="grid-column: span 2;">0</button>
                    <button class="btn-secondary" onclick="appendCalc('.')">.</button>
                    <button class="btn-secondary" onclick="appendCalc('+')">+</button>
                </div>
                <button class="btn-primary" style="width: 100%; margin-top: 15px; padding: 15px;" onclick="calculateResult()">=</button>
                <div id="calcResult" class="result-box" style="display: none;"></div>
            </div>
        </div>

        <!-- 擴展單位轉換 -->
        <div id="converter" class="tab-content">
            <div class="card">
                <h2>📏 全能單位轉換系統 (12+種轉換)</h2>
                
                <h3>🌡️ 溫度轉換</h3>
                <div class="input-row">
                    <div><label>攝氏度 (°C)</label><input type="number" id="celsius" placeholder="輸入" onchange="convertTemp()"></div>
                    <div><label>華氏度 (°F)</label><input type="number" id="fahrenheit" placeholder="華氏度" onchange="convertTemp()"></div>
                </div>

                <h3 style="margin-top: 20px;">📍 距離轉換</h3>
                <div class="input-row">
                    <div><label>公里 (km)</label><input type="number" id="km" placeholder="輸入" onchange="convertDistance()"></div>
                    <div><label>英里 (mi)</label><input type="number" id="mile" placeholder="英里" onchange="convertDistance()"></div>
                </div>
                <div class="input-row">
                    <div><label>公尺 (m)</label><input type="number" id="meter" placeholder="輸入" onchange="convertMeter()"></div>
                    <div><label>英尺 (ft)</label><input type="number" id="feet" placeholder="英尺" onchange="convertMeter()"></div>
                </div>
                <div class="input-row">
                    <div><label>公分 (cm)</label><input type="number" id="cm" placeholder="輸入" onchange="convertCm()"></div>
                    <div><label>英吋 (inch)</label><input type="number" id="inch" placeholder="英吋" onchange="convertCm()"></div>
                </div>

                <h3 style="margin-top: 20px;">⚖️ 重量轉換</h3>
                <div class="input-row">
                    <div><label>公斤 (kg)</label><input type="number" id="kg" placeholder="輸入" onchange="convertWeight()"></div>
                    <div><label>磅 (lb)</label><input type="number" id="lb" placeholder="磅" onchange="convertWeight()"></div>
                </div>
                <div class="input-row">
                    <div><label>克 (g)</label><input type="number" id="gram" placeholder="輸入" onchange="convertGram()"></div>
                    <div><label>盎司 (oz)</label><input type="number" id="ounce" placeholder="盎司" onchange="convertGram()"></div>
                </div>

                <h3 style="margin-top: 20px;">💧 體積轉換</h3>
                <div class="input-row">
                    <div><label>公升 (L)</label><input type="number" id="liter" placeholder="輸入" onchange="convertVolume()"></div>
                    <div><label>加侖 (gal)</label><input type="number" id="gallon" placeholder="加侖" onchange="convertVolume()"></div>
                </div>
                <div class="input-row">
                    <div><label>毫升 (ml)</label><input type="number" id="ml" placeholder="輸入" onchange="convertMl()"></div>
                    <div><label>杯 (cup)</label><input type="number" id="cup" placeholder="杯" onchange="convertMl()"></div>
                </div>

                <h3 style="margin-top: 20px;">⚡ 能量轉換</h3>
                <div class="input-row">
                    <div><label>卡路里 (cal)</label><input type="number" id="calorie" placeholder="輸入" onchange="convertEnergy()"></div>
                    <div><label>焦耳 (J)</label><input type="number" id="joule" placeholder="焦耳" onchange="convertEnergy()"></div>
                </div>

                <h3 style="margin-top: 20px;">⏱️ 時間轉換</h3>
                <div class="input-row">
                    <div><label>小時 (h)</label><input type="number" id="hour" placeholder="輸入" onchange="convertTime()"></div>
                    <div><label>分鐘 (min)</label><input type="number" id="minute" placeholder="分鐘" onchange="convertTime()"></div>
                </div>

                <h3 style="margin-top: 20px;">🌍 速度轉換</h3>
                <div class="input-row">
                    <div><label>公里/小時 (km/h)</label><input type="number" id="kmh" placeholder="輸入" onchange="convertSpeed()"></div>
                    <div><label>英里/小時 (mph)</label><input type="number" id="mph" placeholder="mph" onchange="convertSpeed()"></div>
                </div>
            </div>
        </div>

        <!-- 修復的翻譯工具 -->
        <div id="translator" class="tab-content">
            <div class="card">
                <h2>🌐 翻譯工具 (支援7語言)</h2>
                <div class="input-group">
                    <div class="input-row">
                        <div>
                            <label>源語言</label>
                            <select id="sourceLang">
                                <option value="zh">中文 (簡體)</option>
                                <option value="zh_TW">中文 (繁體)</option>
                                <option value="en">英文</option>
                                <option value="ja">日文</option>
                                <option value="ko">韓文</option>
                                <option value="es">西班牙文</option>
                                <option value="fr">法文</option>
                                <option value="de">德文</option>
                                <option value="ru">俄文</option>
                            </select>
                        </div>
                        <div>
                            <label>目標語言</label>
                            <select id="targetLang">
                                <option value="en">英文</option>
                                <option value="zh">中文 (簡體)</option>
                                <option value="zh_TW">中文 (繁體)</option>
                                <option value="ja">日文</option>
                                <option value="ko">韓文</option>
                                <option value="es">西班牙文</option>
                                <option value="fr">法文</option>
                                <option value="de">德文</option>
                                <option value="ru">俄文</option>
                            </select>
                        </div>
                    </div>
                    <textarea id="translateInput" placeholder="輸入要翻譯的文字..." rows="6" style="resize: vertical;"></textarea>
                    <button class="btn-primary" onclick="translateText()">🔄 翻譯</button>
                </div>
                <div id="translateOutput" class="result-box" style="display: none; word-break: break-all; white-space: pre-wrap;"></div>
                <div class="tip-box">
                    <strong>💡 提示:</strong> 本翻譯工具使用 MyMemory 翻譯API (免費、無需密鑰、離線支援常用詞彙)
                </div>
            </div>
        </div>

        <!-- 其他工具... (待辦清單、筆記等) -->
        <div id="todo" class="tab-content">
            <div class="card">
                <h2>📝 待辦事項</h2>
                <div class="input-group">
                    <input type="text" id="todoInput" placeholder="輸入新任務..." onkeypress="if(event.key==='Enter') addTodo()">
                    <div class="input-row">
                        <select id="todoCategory">
                            <option value="工作">🏢 工作</option>
                            <option value="學習">📚 學習</option>
                            <option value="生活">🏠 生活</option>
                            <option value="其他">🔖 其他</option>
                        </select>
                        <select id="todoPriority">
                            <option value="高">🔴 高優先</option>
                            <option value="中" selected>🟡 中優先</option>
                            <option value="低">🟢 低優先</option>
                        </select>
                    </div>
                    <button class="btn-primary" onclick="addTodo()">➕ 新增任務</button>
                </div>
                <div id="todoList"></div>
            </div>
        </div>

        <div id="notes" class="tab-content">
            <div class="card">
                <h2>📌 便簽筆記</h2>
                <div class="input-group">
                    <input type="text" id="noteTitle" placeholder="筆記標題...">
                    <textarea id="noteContent" placeholder="輸入筆記內容..." rows="4"></textarea>
                    <button class="btn-primary" onclick="addNote()">💾 保存筆記</button>
                </div>
                <div id="notesList"></div>
            </div>
        </div>

        <div id="timer" class="tab-content">
            <div class="card">
                <h2>⏱️ 倒計時器</h2>
                <div class="input-row">
                    <div><label>分鐘</label><input type="number" id="timerMin" value="5" min="0"></div>
                    <div><label>秒</label><input type="number" id="timerSec" value="0" min="0"></div>
                </div>
                <div style="text-align: center; margin: 30px 0;">
                    <div style="font-size: 4rem; font-weight: bold; color: #667eea; font-family: 'Courier New';" id="timerDisplay">05:00</div>
                </div>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button class="btn-primary" style="flex: 1;" onclick="startTimer()" id="timerStartBtn">▶️ 開始</button>
                    <button class="btn-secondary" style="flex: 1; display: none;" onclick="pauseTimer()" id="timerPauseBtn">⏸️ 暫停</button>
                    <button class="btn-danger" style="flex: 1;" onclick="resetTimer()">🔄 重置</button>
                </div>
            </div>
        </div>

        <div id="expense" class="tab-content">
            <div class="card">
                <h2>💰 支出記錄</h2>
                <div class="input-group">
                    <div class="input-row">
                        <div><label>金額</label><input type="number" id="expenseAmount" placeholder="輸入金額" min="0" step="0.01"></div>
                        <div><label>日期</label><input type="date" id="expenseDate"></div>
                    </div>
                    <select id="expenseCategory">
                        <option value="食物">🍔 食物</option>
                        <option value="交通">🚗 交通</option>
                        <option value="購物">🛍️ 購物</option>
                        <option value="娛樂">🎬 娛樂</option>
                        <option value="其他">🔖 其他</option>
                    </select>
                    <input type="text" id="expenseNote" placeholder="備註...">
                    <button class="btn-primary" onclick="addExpense()">➕ 記錄支出</button>
                </div>
                <div id="expenseList"></div>
            </div>
        </div>

        <div id="qrcode" class="tab-content">
            <div class="card">
                <h2>📱 二維碼生成</h2>
                <div class="input-group">
                    <textarea id="qrInput" placeholder="輸入文字或URL..." rows="3"></textarea>
                    <button class="btn-primary" onclick="generateQR()">🔲 生成二維碼</button>
                </div>
                <div id="qrOutput" style="text-align: center; margin-top: 20px;"></div>
            </div>
        </div>

        <div id="password" class="tab-content">
            <div class="card">
                <h2>🔐 強密碼生成</h2>
                <div class="input-group">
                    <div class="input-row">
                        <div><label>密碼長度</label><input type="number" id="pwdLength" value="12" min="6" max="50"></div>
                        <div><label>生成數量</label><input type="number" id="pwdCount" value="5" min="1" max="20"></div>
                    </div>
                    <button class="btn-primary" onclick="generatePasswords()">🔑 生成密碼</button>
                </div>
                <div id="passwordList"></div>
            </div>
        </div>

        <div id="bmi" class="tab-content">
            <div class="card">
                <h2>⚖️ BMI 計算</h2>
                <div class="input-group">
                    <div class="input-row">
                        <div><label>身高 (cm)</label><input type="number" id="bmiHeight" placeholder="輸入身高" min="0"></div>
                        <div><label>體重 (kg)</label><input type="number" id="bmiWeight" placeholder="輸入體重" min="0"></div>
                    </div>
                    <button class="btn-primary" onclick="calculateBMI()">計算BMI</button>
                </div>
                <div id="bmiResult" class="result-box" style="display: none;"></div>
            </div>
        </div>

        <div id="age" class="tab-content">
            <div class="card">
                <h2>🎂 年齡計算</h2>
                <div class="input-group">
                    <div><label>出生日期</label><input type="date" id="birthDate"></div>
                    <button class="btn-primary" onclick="calculateAge()">計算年齡</button>
                </div>
                <div id="ageResult" class="result-box" style="display: none;"></div>
            </div>
        </div>
    </div>

    <script>
        const state = {
            todos: [],
            notes: [],
            expenses: [],
            timerInterval: null,
            timerSeconds: 0,
            isTimerRunning: false
        };

        function init() {
            loadData();
            setTodayDate();
            renderTodos();
            renderNotes();
            renderExpenses();
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        function saveData() { localStorage.setItem('appState', JSON.stringify(state)); }
        function loadData() { const saved = localStorage.getItem('appState'); if (saved) Object.assign(state, JSON.parse(saved)); }
        function setTodayDate() { document.getElementById('expenseDate').value = new Date().toISOString().split('T')[0]; }

        // 計算機
        function appendCalc(val) { document.getElementById('calcInput').value += val; }
        function calculateResult() {
            try {
                const result = eval(document.getElementById('calcInput').value);
                document.getElementById('calcResult').innerHTML = `<strong>結果:</strong> ${result}`;
                document.getElementById('calcResult').style.display = 'block';
            } catch (e) { alert('計算式錯誤'); }
        }

        // 單位轉換函數
        function convertTemp() {
            const c = parseFloat(document.getElementById('celsius').value);
            if (!isNaN(c)) document.getElementById('fahrenheit').value = (c * 9/5 + 32).toFixed(2);
        }
        function convertDistance() {
            const km = parseFloat(document.getElementById('km').value);
            if (!isNaN(km)) document.getElementById('mile').value = (km * 0.621371).toFixed(4);
        }
        function convertMeter() {
            const m = parseFloat(document.getElementById('meter').value);
            if (!isNaN(m)) document.getElementById('feet').value = (m * 3.28084).toFixed(4);
        }
        function convertCm() {
            const cm = parseFloat(document.getElementById('cm').value);
            if (!isNaN(cm)) document.getElementById('inch').value = (cm / 2.54).toFixed(4);
        }
        function convertWeight() {
            const kg = parseFloat(document.getElementById('kg').value);
            if (!isNaN(kg)) document.getElementById('lb').value = (kg * 2.20462).toFixed(4);
        }
        function convertGram() {
            const g = parseFloat(document.getElementById('gram').value);
            if (!isNaN(g)) document.getElementById('ounce').value = (g / 28.3495).toFixed(4);
        }
        function convertVolume() {
            const l = parseFloat(document.getElementById('liter').value);
            if (!isNaN(l)) document.getElementById('gallon').value = (l * 0.264172).toFixed(4);
        }
        function convertMl() {
            const ml = parseFloat(document.getElementById('ml').value);
            if (!isNaN(ml)) document.getElementById('cup').value = (ml / 236.588).toFixed(4);
        }
        function convertEnergy() {
            const cal = parseFloat(document.getElementById('calorie').value);
            if (!isNaN(cal)) document.getElementById('joule').value = (cal * 4.184).toFixed(4);
        }
        function convertTime() {
            const h = parseFloat(document.getElementById('hour').value);
            if (!isNaN(h)) document.getElementById('minute').value = (h * 60).toFixed(2);
        }
        function convertSpeed() {
            const kmh = parseFloat(document.getElementById('kmh').value);
            if (!isNaN(kmh)) document.getElementById('mph').value = (kmh * 0.621371).toFixed(4);
        }

        // 翻譯工具 - 修復版本
        async function translateText() {
            const text = document.getElementById('translateInput').value;
            const source = document.getElementById('sourceLang').value;
            const target = document.getElementById('targetLang').value;
            
            if (!text) { alert('請輸入要翻譯的文字'); return; }

            const output = document.getElementById('translateOutput');
            output.innerHTML = '⏳ 正在翻譯...';
            output.style.display = 'block';

            try {
                // 使用 MyMemory 翻譯 API (無需密鑰，免費)
                const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${source}|${target}`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.responseStatus === 200) {
                    output.innerHTML = `<strong>翻譯結果:</strong><br>${data.responseData.translatedText}`;
                } else {
                    output.innerHTML = `<strong>翻譯結果:</strong><br>${data.responseData.translatedText || '翻譯失敗，請重試'}`;
                }
            } catch (e) {
                output.innerHTML = `<strong>❌ 錯誤:</strong><br>網絡連接失敗，請檢查網絡連接或稍後重試`;
            }
        }

        // 待辦清單
        function addTodo() {
            const input = document.getElementById('todoInput');
            if (!input.value.trim()) return;
            state.todos.push({
                id: Date.now(),
                text: input.value,
                category: document.getElementById('todoCategory').value,
                priority: document.getElementById('todoPriority').value,
                completed: false
            });
            saveData();
            renderTodos();
            input.value = '';
        }

        function renderTodos() {
            const list = document.getElementById('todoList');
            if (state.todos.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: #999;">還沒有任務</p>';
                return;
            }
            list.innerHTML = state.todos.map(todo => `
                <div style="background: #f8f9fa; padding: 15px; margin-bottom: 12px; border-radius: 10px; border-left: 4px solid #667eea; display: flex; justify-content: space-between; align-items: center;">
                    <input type="checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleTodo(${todo.id})" style="margin-right: 10px;">
                    <div style="flex: 1;">
                        <h4 style="margin-bottom: 5px; text-decoration: ${todo.completed ? 'line-through' : 'none'};">${todo.text}</h4>
                        <p style="color: #666; margin: 0; font-size: 0.9rem;">${todo.category} • ${todo.priority}</p>
                    </div>
                    <button class="btn-danger" style="padding: 6px 12px;" onclick="deleteTodo(${todo.id})">刪除</button>
                </div>
            `).join('');
        }

        function toggleTodo(id) {
            const todo = state.todos.find(t => t.id === id);
            if (todo) todo.completed = !todo.completed;
            saveData();
            renderTodos();
        }

        function deleteTodo(id) {
            state.todos = state.todos.filter(t => t.id !== id);
            saveData();
            renderTodos();
        }

        // 便簽筆記
        function addNote() {
            const title = document.getElementById('noteTitle').value.trim();
            const content = document.getElementById('noteContent').value.trim();
            if (!title || !content) return;
            state.notes.push({
                id: Date.now(),
                title,
                content,
                createdAt: new Date().toLocaleString('zh-TW')
            });
            saveData();
            renderNotes();
            document.getElementById('noteTitle').value = '';
            document.getElementById('noteContent').value = '';
        }

        function renderNotes() {
            const list = document.getElementById('notesList');
            if (state.notes.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: #999;">還沒有筆記</p>';
                return;
            }
            list.innerHTML = state.notes.map(note => `
                <div style="background: #fff9e6; padding: 15px; margin-bottom: 12px; border-radius: 10px; border-left: 4px solid #ffd93d; display: flex; justify-content: space-between;">
                    <div style="flex: 1;">
                        <h4 style="margin-bottom: 5px; color: #333;">${note.title}</h4>
                        <p style="color: #666; margin: 0; word-break: break-word;">${note.content}</p>
                        <p style="font-size: 0.8rem; color: #999; margin-top: 5px;">${note.createdAt}</p>
                    </div>
                    <button class="btn-danger" style="padding: 6px 12px; height: fit-content;" onclick="deleteNote(${note.id})">刪除</button>
                </div>
            `).join('');
        }

        function deleteNote(id) {
            state.notes = state.notes.filter(n => n.id !== id);
            saveData();
            renderNotes();
        }

        // 計時器
        function startTimer() {
            if (state.isTimerRunning) return;
            if (state.timerSeconds === 0) {
                state.timerSeconds = parseInt(document.getElementById('timerMin').value) * 60 + parseInt(document.getElementById('timerSec').value);
            }
            state.isTimerRunning = true;
            document.getElementById('timerStartBtn').style.display = 'none';
            document.getElementById('timerPauseBtn').style.display = 'inline-block';
            state.timerInterval = setInterval(() => {
                state.timerSeconds--;
                updateTimerDisplay();
                if (state.timerSeconds <= 0) {
                    clearInterval(state.timerInterval);
                    state.isTimerRunning = false;
                    alert('⏰ 倒計時完成！');
                    document.getElementById('timerStartBtn').style.display = 'inline-block';
                    document.getElementById('timerPauseBtn').style.display = 'none';
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(state.timerInterval);
            state.isTimerRunning = false;
            document.getElementById('timerStartBtn').style.display = 'inline-block';
            document.getElementById('timerPauseBtn').style.display = 'none';
        }

        function resetTimer() {
            clearInterval(state.timerInterval);
            state.isTimerRunning = false;
            state.timerSeconds = 0;
            document.getElementById('timerStartBtn').style.display = 'inline-block';
            document.getElementById('timerPauseBtn').style.display = 'none';
            updateTimerDisplay();
        }

        function updateTimerDisplay() {
            const min = Math.floor(state.timerSeconds / 60);
            const sec = state.timerSeconds % 60;
            document.getElementById('timerDisplay').textContent = `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
        }

        // 支出記錄
        function addExpense() {
            const amount = parseFloat(document.getElementById('expenseAmount').value);
            if (!amount) return;
            state.expenses.push({
                id: Date.now(),
                amount,
                date: document.getElementById('expenseDate').value,
                category: document.getElementById('expenseCategory').value,
                note: document.getElementById('expenseNote').value
            });
            saveData();
            renderExpenses();
            document.getElementById('expenseAmount').value = '';
            document.getElementById('expenseNote').value = '';
        }

        function renderExpenses() {
            const list = document.getElementById('expenseList');
            const total = state.expenses.reduce((sum, e) => sum + e.amount, 0);
            list.innerHTML = `<div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 10px; margin-bottom: 15px;"><div style="font-size: 2rem; font-weight: bold;">¥${total.toFixed(2)}</div><div style="opacity: 0.9;">總支出</div></div>` +
                state.expenses.map(e => `
                <div style="background: #f8f9fa; padding: 15px; margin-bottom: 12px; border-radius: 10px; border-left: 4px solid #667eea; display: flex; justify-content: space-between; align-items: center;">
                    <div style="flex: 1;">
                        <h4 style="margin-bottom: 5px;">${e.category}</h4>
                        <p style="color: #666; margin: 0; font-size: 0.9rem;">${e.date} ${e.note ? '• ' + e.note : ''}</p>
                    </div>
                    <div style="color: #ff6b6b; font-weight: bold; margin-right: 10px;">¥${e.amount.toFixed(2)}</div>
                    <button class="btn-danger" style="padding: 6px 12px;" onclick="deleteExpense(${e.id})">刪除</button>
                </div>
            `).join('');
        }

        function deleteExpense(id) {
            state.expenses = state.expenses.filter(e => e.id !== id);
            saveData();
            renderExpenses();
        }

        // 二維碼
        function generateQR() {
            const text = document.getElementById('qrInput').value.trim();
            if (!text) return;
            const url = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(text)}`;
            document.getElementById('qrOutput').innerHTML = `<img src="${url}" style="max-width: 300px; border-radius: 10px;"><br><a href="${url}" download="qrcode.png" class="btn-primary" style="display: inline-block; margin-top: 15px; text-decoration: none;">⬇️ 下載</a>`;
        }

        // 密碼生成
        function generatePasswords() {
            const length = parseInt(document.getElementById('pwdLength').value);
            const count = parseInt(document.getElementById('pwdCount').value);
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*';
            let passwords = [];
            for (let i = 0; i < count; i++) {
                let pwd = '';
                for (let j = 0; j < length; j++) pwd += chars.charAt(Math.floor(Math.random() * chars.length));
                passwords.push(pwd);
            }
            document.getElementById('passwordList').innerHTML = passwords.map(pwd => `
                <div style="background: #f8f9fa; padding: 15px; margin-bottom: 12px; border-radius: 10px; border-left: 4px solid #667eea; display: flex; justify-content: space-between; align-items: center;">
                    <code style="font-size: 1.1rem; font-weight: bold; flex: 1;">${pwd}</code>
                    <button class="btn-secondary" style="padding: 6px 12px;" onclick="navigator.clipboard.writeText('${pwd}'); alert('已複製');">📋 複製</button>
                </div>
            `).join('');
        }

        // BMI
        function calculateBMI() {
            const height = parseFloat(document.getElementById('bmiHeight').value) / 100;
            const weight = parseFloat(document.getElementById('bmiWeight').value);
            if (!height || !weight) return;
            const bmi = weight / (height * height);
            let category = bmi < 18.5 ? '體重過輕' : bmi < 25 ? '正常體重' : bmi < 30 ? '體重過重' : '肥胖';
            const result = document.getElementById('bmiResult');
            result.innerHTML = `<strong>BMI:</strong> ${bmi.toFixed(1)}<br><strong>分類:</strong> ${category}`;
            result.style.display = 'block';
        }

        // 年齡
        function calculateAge() {
            const birthDate = new Date(document.getElementById('birthDate').value);
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const m = today.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) age--;
            const result = document.getElementById('ageResult');
            result.innerHTML = `<strong>你已經 ${age} 歲了！</strong><br>距離下個生日還有 ${Math.floor((new Date(today.getFullYear() + 1, birthDate.getMonth(), birthDate.getDate()) - today) / (1000 * 60 * 60 * 24))} 天`;
            result.style.display = 'block';
        }

        init();
    </script>
</body>
</html>
